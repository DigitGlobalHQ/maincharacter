<!doctype html>
<!-- Paywall waitlist (Night-4, P0.3). Served by /paywall while PAYWALL_PUBLIC is
     false so live Razorpay keys cannot be charged during the dogfood window.
     Copy supplied verbatim in the autopilot brief. // TODO copy review -->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MainCharacter — The Chamber</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Sora:wght@200;300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --obsidian: #070708;
      --panel: #0d0d0f;
      --line: #1d1d20;
      /* Silver system — retired gold aliases */
      --gold: #c0c0c0;
      --gold-glow: rgba(255,255,255,0.12);
      --silver-bright: #e8e8e8;
      --silver-mid: #c0c0c0;
      --ink: #f4f1ea;
      --muted: #8a877f;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--obsidian);
      color: var(--ink);
      font-family: 'Sora', system-ui, sans-serif;
      font-weight: 300;
      line-height: 1.6;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 48px 20px;
      background-image: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.06), transparent 50%);
    }
    .wrap { max-width: 480px; width: 100%; text-align: center; }
    .eyebrow { color: var(--silver-mid); letter-spacing: 4px; font-size: 11px; text-transform: uppercase; }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 500; font-style: italic;
      font-size: clamp(28px, 6vw, 40px); line-height: 1.2;
      margin: 18px 0 14px;
    }
    .lede { color: var(--muted); font-size: 15px; margin: 0 auto 32px; max-width: 380px; }
    .form { border: 1px solid var(--line); border-radius: 14px; background: var(--panel); padding: 28px 26px; text-align: left; }
    .field { margin-bottom: 16px; }
    label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; letter-spacing: 0.5px; }
    input {
      width: 100%; background: #050506; border: 1px solid var(--line); border-radius: 8px;
      color: var(--ink); font-family: 'Sora', sans-serif; font-size: 15px; padding: 12px 14px;
    }
    input:focus { outline: none; border-color: var(--silver-mid); }
    .btn {
      display: block; width: 100%; text-align: center; cursor: pointer; margin-top: 6px;
      border: 1px solid rgba(232,232,232,0.32); background: rgba(255,255,255,0.18); color: #ffffff;
      font-family: 'Sora', sans-serif; font-size: 14px; font-weight: 600;
      padding: 13px; border-radius: 9px; transition: opacity .18s, box-shadow .18s;
      box-shadow: 0 0 24px rgba(255,255,255,0.12);
    }
    .btn:disabled { opacity: .5; cursor: default; }
    .err { color: #d98b8b; font-size: 13px; min-height: 18px; margin-top: 10px; text-align: center; }
    .done { display: none; }
    .done h2 { font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 500; font-size: 26px; margin-bottom: 10px; }
    .done p { color: var(--muted); font-size: 15px; }
    .footer { color: #5f5d58; font-size: 12px; margin-top: 28px; }
    /* Verbatim from paywall.html:43-50 — SHARED: keep in sync with paywall.html */
    .audit-summary {
      display: none;
      max-width: 600px; margin: 18px auto 0;
      border: 1px solid var(--line); border-radius: 12px;
      background: var(--panel); padding: 16px 20px;
      text-align: center; color: var(--ink); font-size: 14px;
    }
    .audit-summary b { color: var(--gold); font-weight: 600; }
  </style>
<script src="/track.js" defer></script>
</head>
<body>
  <div class="wrap">
    <div class="eyebrow">◆ MainCharacter</div>
    <h1>The Chamber opens this weekend.</h1>
    <p class="lede">Add your number — you'll be the first walked in. ◆ MainCharacter</p>

    <!-- [COPY DRAFT — founder approval] F1 audit echo: "Your Aura Score: X/100. Axis is your leverage point." -->
    <!-- Shown only when a valid auditSessionToken is present in the URL. Hidden silently on 404/409/network error. -->
    <div class="audit-summary" id="waitlistAuditSummary" aria-live="polite"></div>

    <form class="form" id="form">
      <div class="field">
        <label for="name">Your name</label>
        <input id="name" type="text" autocomplete="name" required />
      </div>
      <div class="field">
        <label for="phone">WhatsApp number</label>
        <input id="phone" type="tel" inputmode="numeric" autocomplete="tel" placeholder="10-digit number" required />
      </div>
      <button class="btn" id="submit" type="submit">Hold my place</button>
      <div class="err" id="err"></div>
    </form>

    <div class="done" id="done">
      <h2>You're on the list.</h2>
      <p>When the doors open, yours opens first. ◆ MainCharacter</p>
    </div>

    <div class="footer">The diagnosis is free. The discipline arrives soon.</div>
  </div>

  <script src="/shared/audit-echo.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const auditSessionToken = params.get('auditSessionToken') || null;

    // F1: echo the audit score above the form using the shared helper.
    // On 404/409/any error, loadAuditEcho hides the element — form still works.
    loadAuditEcho(auditSessionToken, 'waitlistAuditSummary').then(function() {
      var echoEl = document.getElementById('waitlistAuditSummary');
      var echoShown = !!(echoEl && echoEl.style.display !== 'none' && echoEl.innerHTML.trim());
      // B5: paywall_viewed (mode=waitlist)
      if (window.mc) window.mc.trackOnce('paywall_viewed', { mode: 'waitlist', auditEchoShown: echoShown }, 'paywall_viewed_session');
    }).catch(function() {
      if (window.mc) window.mc.trackOnce('paywall_viewed', { mode: 'waitlist', auditEchoShown: false }, 'paywall_viewed_session');
    });
    const form = document.getElementById('form');
    const errEl = document.getElementById('err');
    const btn = document.getElementById('submit');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errEl.textContent = '';
      const name = document.getElementById('name').value.trim();
      const phone = document.getElementById('phone').value.replace(/\D/g, '');
      if (!name) { errEl.textContent = 'A name, first.'; return; }
      if (!/^\d{10,13}$/.test(phone)) { errEl.textContent = 'Enter a valid number.'; return; }
      btn.disabled = true;
      try {
        const res = await fetch('/api/waitlist/early-access', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, phone, auditSessionToken }),
        });
        if (!res.ok) throw new Error('failed');
        // B5: early_access_submitted
        if (window.mc) window.mc.track('early_access_submitted', { hasEmail: false, followupConsent: false });
        form.style.display = 'none';
        document.getElementById('done').style.display = 'block';
      } catch {
        errEl.textContent = 'Something held it back. Try once more.';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
