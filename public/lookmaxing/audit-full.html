  <link rel="stylesheet" href="/lookmaxing/tokens.css">

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    .lm-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      padding: 0 var(--mc-sp-4);
      border-bottom: 1px solid var(--mc-line);
    }
    .lm-nav__brand {
      font-family: var(--mc-font-sans);
      font-size: var(--mc-fs-eyebrow);
      font-weight: 500;
      letter-spacing: var(--mc-ls-xwide);
      text-transform: uppercase;
      color: var(--mc-silver-mid);
    }
    .lm-nav__badge {
      font-family: var(--mc-font-mono);
      font-size: var(--mc-fs-mono);
      color: var(--mc-silver-dim);
    }

    .lm-full-body {
      max-width: 720px;
      margin: 0 auto;
      padding: var(--mc-sp-6) var(--mc-sp-4) var(--mc-sp-8);
    }

    /* ── Score header ── */
    .lm-full-score-header {
      display: flex;
      align-items: baseline;
      gap: var(--mc-sp-4);
      margin-bottom: var(--mc-sp-5);
    }
    .lm-full-score-num {
      font-family: var(--mc-font-mono);
      font-size: var(--mc-fs-h2);
      background: var(--mc-silver-gradient);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
    }
    .lm-full-score-sep { color: var(--mc-silver-faint); }
    .lm-full-rank {
      font-family: var(--mc-font-mono);
      font-size: var(--mc-fs-mono);
      letter-spacing: var(--mc-ls-xwide);
      text-transform: uppercase;
      color: var(--mc-silver-mid);
    }

    /* ── Section labels ── */
    .lm-section-label {
      display: flex;
      align-items: center;
      gap: var(--mc-sp-3);
      margin: var(--mc-sp-6) 0 var(--mc-sp-4);
    }
    .lm-section-label__text {
      font-family: var(--mc-font-mono);
      font-size: var(--mc-fs-eyebrow);
      letter-spacing: var(--mc-ls-xwide);
      text-transform: uppercase;
      color: var(--mc-silver-dim);
      white-space: nowrap;
    }
    .lm-section-label__line { flex: 1; height: 1px; background: var(--mc-line); }

    /* ── Block intro ── */
    .lm-block-intro {
      font-size: var(--mc-fs-small);
      color: var(--mc-silver-dim);
      margin: 0 0 var(--mc-sp-4);
    }

    /* ── Decomposition ── */
    .lm-decomp-group { margin-bottom: var(--mc-sp-6); }
    .lm-decomp-group__header {
      font-family: var(--mc-font-mono);
      font-size: var(--mc-fs-eyebrow);
      letter-spacing: var(--mc-ls-xwide);
      text-transform: uppercase;
      color: var(--mc-silver-faint);
      margin: 0 0 var(--mc-sp-2);
    }
    .lm-metric-row {
      display: flex;
      align-items: center;
      gap: var(--mc-sp-4);
      padding: var(--mc-sp-2) 0;
      border-bottom: 1px solid var(--mc-line);
      flex-wrap: wrap;
    }
    @media (min-width: 768px) { .lm-metric-row { flex-wrap: nowrap; } }
    .lm-metric-label {
      font-size: var(--mc-fs-small);
      color: var(--mc-silver-bright);
      min-width: 120px;
    }
    .lm-tick-bar {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 2px;
      flex: 1;
      min-width: 100px;
    }
    .lm-tick {
      height: 4px;
      border-radius: 1px;
      background: var(--mc-silver-ghost);
    }
    .lm-tick.is-filled { background: var(--mc-silver-bright); }
    .lm-metric-score {
      font-family: var(--mc-font-mono);
      font-size: var(--mc-fs-mono);
      color: var(--mc-silver-bright);
      min-width: 2em;
      text-align: right;
    }
    .lm-metric-cause {
      font-family: var(--mc-font-serif);
      font-style: italic;
      font-size: var(--mc-fs-small);
      color: var(--mc-silver-mid);
      margin: var(--mc-sp-2) 0 0;
      padding-left: var(--mc-sp-4);
    }
    .lm-metric-cause::before { content: '─ '; color: var(--mc-silver-faint); }
    .lm-metric-fix {
      font-family: var(--mc-font-serif);
      font-style: italic;
      font-size: var(--mc-fs-small);
      color: var(--mc-silver-mid);
      margin: var(--mc-sp-1) 0 var(--mc-sp-3);
      padding-left: var(--mc-sp-4);
    }
    .lm-metric-fix::before { content: '─ '; color: var(--mc-silver-faint); }

    /* ── Biggest lever ── */
    .lm-lever {
      font-size: var(--mc-fs-h3);
      margin: 0 0 var(--mc-sp-3);
    }

    /* ── Quests ── */
    .lm-quests { list-style: none; padding: 0; margin: 0; }
    .lm-quests li {
      padding: var(--mc-sp-3) 0;
      border-bottom: 1px solid var(--mc-line);
      font-size: var(--mc-fs-body);
      color: var(--mc-silver-bright);
      display: flex;
      align-items: flex-start;
      gap: var(--mc-sp-3);
    }
    .lm-quests li::before { content: '·'; color: var(--mc-silver-faint); flex-shrink: 0; margin-top: 2px; }

    /* ── Style & colour ── */
    .lm-style-row {
      display: flex;
      gap: var(--mc-sp-4);
      padding: var(--mc-sp-3) 0;
      border-bottom: 1px solid var(--mc-line);
      font-size: var(--mc-fs-small);
    }
    .lm-style-row__key {
      font-family: var(--mc-font-mono);
      font-size: var(--mc-fs-mono);
      letter-spacing: var(--mc-ls-wide);
      color: var(--mc-silver-faint);
      text-transform: uppercase;
      min-width: 80px;
    }
    .lm-style-row__val { color: var(--mc-silver-bright); line-height: var(--mc-lh-body); }
    .lm-palette-swatches { display: flex; gap: var(--mc-sp-2); flex-wrap: wrap; }
    .lm-swatch {
      width: 24px;
      height: 24px;
      border-radius: var(--mc-r-1);
      border: 1px solid var(--mc-line-strong);
      background: var(--mc-silver-mid);
    }

    /* ── Starter plan ── */
    .lm-plan-row {
      padding: var(--mc-sp-4) 0;
      border-bottom: 1px solid var(--mc-line);
    }
    .lm-plan-day {
      font-family: var(--mc-font-mono);
      font-size: var(--mc-fs-eyebrow);
      letter-spacing: var(--mc-ls-xwide);
      color: var(--mc-silver-faint);
      text-transform: uppercase;
      margin: 0 0 var(--mc-sp-2);
    }
    .lm-plan-task {
      font-size: var(--mc-fs-small);
      color: var(--mc-silver-bright);
      margin: 0 0 var(--mc-sp-1);
    }
    .lm-plan-label {
      font-family: var(--mc-font-mono);
      font-size: 0.625rem;
      letter-spacing: var(--mc-ls-wide);
      color: var(--mc-silver-faint);
      text-transform: uppercase;

    /* ── PDF download ── */
    .lm-pdf-section {
      margin: var(--mc-sp-7) 0 var(--mc-sp-5);
      text-align: center;
    }
    .lm-pdf-btn {

    }
    .lm-pdf-sub {
      font-size: var(--mc-fs-small);
      color: var(--mc-silver-faint);
      margin: var(--mc-sp-2) 0 0;
    }

    /* ── Continue ── */
    .lm-continue-section {
      text-align: center;
      margin-top: var(--mc-sp-5);
    }

    /* ── Scroll reveal ── */
    .lm-reveal {
      opacity: 0;
      transform: translateY(8px);
      transition: opacity var(--mc-dur-base) var(--mc-ease),
                  transform var(--mc-dur-base) var(--mc-ease);
    }
    .lm-reveal.is-visible { opacity: 1; transform: none; }

    @media (prefers-reduced-motion: reduce) {
      .lm-reveal { opacity: 1; transform: none; transition: none; }
    }

    /* Error state */
    .lm-state-error {
      text-align: center;
      padding: var(--mc-sp-8) var(--mc-sp-4);
    }

      color: var(--mc-silver-faint);

<script>
(function () {
  'use strict';

  // Sign-in required (funnel-repair P1).
  function lmToken() { return localStorage.getItem('lookmax.token') || ''; }
  function authHeaders(extra) {
    var h = extra || {};
    var t = lmToken();
    if (t) h['Authorization'] = 'Bearer ' + t;
    return h;
  }
  if (!lmToken()) { window.location.replace('/lookmaxing/start'); return; }

  var pathParts = window.location.pathname.split('/').filter(Boolean);
  // URL: /lookmaxing/audit/:id/full
  var auditId = pathParts[pathParts.length - 2] || '';

  var loadingEl = document.getElementById('full-loading');
  var errorEl = document.getElementById('full-error');
  var reportEl = document.getElementById('full-report');
  var navBadge = document.getElementById('nav-badge');

  if (auditId) {
    navBadge.textContent = 'AUDIT · ' + auditId.slice(0, 9).toUpperCase() + ' · FULL';
  }

  function loadFull() {
    fetch('/api/lookmaxing/audit/' + auditId, { headers: authHeaders() })
      .then(function (res) {
        if (!res.ok) throw new Error('failed ' + res.status);
        return res.json();
      })
      .then(function (data) {
        loadingEl.hidden = true;
        if (!data.paid) {
          // Not paid — redirect to free view
          window.location.href = '/lookmaxing/audit/' + auditId;
          return;
        }
        renderFull(data.report || {});
      })
      .catch(function () {
        loadingEl.hidden = true;
        errorEl.hidden = false;
      });
  }

  function clsMeta(c) {
    if (c === 'leverage') return { shape: 'dia', col: '#7da0c4', t: 'Leverage via state' };
    if (c === 'fixed')    return { shape: 'ring', col: '#8a8a93', t: 'Fixed · context' };
    return { shape: 'dot', col: '#6fae8e', t: 'Actionable' };
  }
  // CSS-shape marker (dot / diamond / ring) — never the ◆ glyph, which the global
  // brand-mark swap would replace with the logo image.
  function clsMarker(mm) {
    if (mm.shape === 'ring') return '<span class="lm-mk lm-mk--ring" style="border-color:' + mm.col + '"></span>';
    if (mm.shape === 'dia')  return '<span class="lm-mk lm-mk--dia" style="background:' + mm.col + ';transform:rotate(45deg);"></span>';
    return '<span class="lm-mk lm-mk--dot" style="background:' + mm.col + '"></span>';
  }
  function sectionLabel(text) {
    return '<div class="lm-section-label" aria-hidden="true"><span class="lm-section-label__text">' + esc(text) + '</span><div class="lm-section-label__line"></div></div>';
  }
  function safeHex(hex) {
    var raw = String(hex || '').trim();
    return /^#?[0-9a-fA-F]{3,8}$/.test(raw) ? (raw[0] === '#' ? raw : '#' + raw) : '#888888';
  }
  // Swatch card — colour block on top, name + hex + note beneath. Used in grids.
  function paletteCard(hex, name, note) {
    var safe = safeHex(hex);
    return '<div class="lm-pal"><div class="lm-pal__sw" style="background:' + safe + '"></div>'
      + '<div class="lm-pal__body"><div class="lm-pal__name">' + esc(name || '')
      + ' <span class="lm-pal__hex">' + safe.toUpperCase() + '</span></div>'
      + (note ? '<div class="lm-pal__note">' + esc(note) + '</div>' : '')
      + '</div></div>';
  }

  function renderFull(report) {
    reportEl.hidden = false;
    var g10 = (typeof report.globalScore10 === 'number') ? report.globalScore10 : (report.auraScore ? report.auraScore / 10 : null);
    document.getElementById('full-score-num').textContent = g10 != null ? g10.toFixed(1) : (report.auraScore || '…');
    var rankBits = [];
    if (report.archetype) rankBits.push(report.archetype);
    else if (report.rank) rankBits.push(capitalise(report.rank));
    if (report.percentile) rankBits.push(report.percentile + 'th percentile');
    document.getElementById('full-rank').textContent = rankBits.join(' · ') || capitalise(report.rank || '');
    document.getElementById('full-impression').textContent = report.firstImpression || '';
    var statusWrap = document.getElementById('full-status-wrap');
    if (report.statusAlert && statusWrap) {
      document.getElementById('full-status').textContent = report.statusAlert;
      statusWrap.hidden = false;
    }

    var bp = document.getElementById('blueprint-container');
    // Rescue: a paid report with no vectors is incomplete (generated during an
    // earlier truncation window). Offer a one-tap regeneration through the fixed
    // pipeline rather than showing a half-empty page.
    if (!Array.isArray(report.vectors) || !report.vectors.length) {
      if (bp) {
        bp.innerHTML =
        '<div class="lm-section-label" aria-hidden="true"><span class="lm-section-label__text">YOUR FULL BLUEPRINT</span><div class="lm-section-label__line"></div></div>'
        + '<p class="lm-block-intro">Your full diagnostic is being finalised. Generate it now. It takes a few seconds.</p>'
        + '<button type="button" id="reanalyze-btn" class="mc-btn-primary mc-light-point-glow" style="min-height:52px;">Generate my full Blueprint →</button>'
        + '<p id="reanalyze-status" style="color:var(--mc-silver-faint);font-size:13px;margin-top:10px;"></p>';
        bp.classList.add('is-visible');
      }
      var rb = document.getElementById('reanalyze-btn');
      if (rb) rb.addEventListener('click', function () {
        rb.disabled = true; rb.textContent = 'Generating…';
        fetch('/api/lookmaxing/analyze', { method: 'POST', headers: authHeaders({ 'Content-Type': 'application/json' }), body: JSON.stringify({ auditId: auditId }) })
          .then(function (r) { if (!r.ok) throw new Error('x'); return r.json(); })
          .then(function () { window.location.reload(); })
          .catch(function () { rb.disabled = false; rb.textContent = 'Generate my full Blueprint →'; document.getElementById('reanalyze-status').textContent = 'Try once more in a moment.'; });
      });
      initReveal();
      if (window.mc) window.mc.track('lookmaxing_audit_viewed', { resolution: 'full_incomplete' });
      return;
    }

    var html = '';
    if (Array.isArray(report.vectors) && report.vectors.length) {
      html += sectionLabel('02 · BIOMETRIC GAP ANALYSIS');
      html += '<p class="lm-block-intro">Twenty-four metrics across five regions. Each finding pairs the clinical root cause with a score and a verdict.</p>';
      html += '<div class="lm-legend">';
      ['actionable', 'leverage', 'fixed'].forEach(function (c) { var mm = clsMeta(c); html += '<span>' + clsMarker(mm) + esc(mm.t) + '</span>'; });
      html += '</div>';
      report.vectors.forEach(function (v) {
        html += '<div class="lm-card">';
        html += '<div class="lm-vhead"><span class="lm-vhead__num">VECTOR ' + esc(v.numeral || '') + '</span><span class="lm-vhead__name">' + esc((v.name || '').toUpperCase()) + '</span></div>';
        (v.metrics || []).forEach(function (m) {
          var mm = clsMeta(m.class);
          var sc = (typeof m.score10 === 'number' ? m.score10.toFixed(1) : esc(String(m.score10 || '')));
          var pct = (typeof m.score10 === 'number') ? Math.max(4, Math.min(100, m.score10 * 10)) : 0;
          html += '<div class="lm-metric">';
          html += '<div class="lm-metric__top"><div><div class="lm-metric__name">' + esc(formatMetricName(m.metric || '')) + '</div>'
            + (m.subtitle ? '<div class="lm-metric__sub">' + esc(m.subtitle) + '</div>' : '') + '</div>';
          html += '<div class="lm-metric__score">' + sc + '<small> /10</small></div></div>';
          html += '<div class="lm-bar"><i style="width:' + pct + '%"></i></div>';
          if (m.rootCause) html += '<div class="lm-metric__cause">' + esc(m.rootCause) + '</div>';
          html += '<span class="lm-pill" style="border-color:' + mm.col + '55;color:' + mm.col + '">' + clsMarker(mm) + esc(mm.t) + '</span>';
          html += '</div>';
        });
        html += '</div>';
      });
    }

    var c = report.chromatic;
    if (c) {
      html += sectionLabel('03 · THE CHROMATIC & GROOMING ARSENAL');
      html += '<p class="lm-block-intro">Colour is the highest-ROI lever. It re-engineers how the skin reads with no physical intervention.</p>';
      html += '<div class="lm-trait-grid">';
      [['UNDERTONE', c.undertone, c.undertoneNote], ['CONTRAST', c.contrast, c.contrastNote], ['FAMILY', c.profile, c.profileNote]].forEach(function (t) {
        html += '<div class="lm-trait"><div class="lm-trait__k">' + esc(t[0]) + '</div><div class="lm-trait__v">' + esc(t[1] || '—') + '</div>'
          + (t[2] ? '<div class="lm-trait__note">' + esc(String(t[2]).toUpperCase()) + '</div>' : '') + '</div>';
      });
      html += '</div>';
      if (c.powerPalette && c.powerPalette.length) { html += '<p class="mc-eyebrow" style="margin-bottom:var(--mc-sp-3)">THE POWER PALETTE</p><div class="lm-pal-grid">'; c.powerPalette.forEach(function (s) { html += paletteCard(s.hex, s.name, s.note); }); html += '</div>'; }
      if (c.supportingNeutrals) html += '<p style="color:var(--mc-silver-faint);font-size:12px;font-style:italic;margin:0 0 var(--mc-sp-4)">Supporting neutrals: ' + esc(c.supportingNeutrals) + '</p>';
      if (c.antiPalette && c.antiPalette.length) { html += '<p class="mc-eyebrow" style="margin:var(--mc-sp-5) 0 var(--mc-sp-3)">THE ANTI-PALETTE · NEVER AT THE FACE</p><div class="lm-pal-grid">'; c.antiPalette.forEach(function (s) { html += paletteCard(s.hex, 'Avoid: ' + (s.name || ''), s.impact); }); html += '</div>'; }
      if (c.metals || c.stylingCorrections) {
        html += '<div class="lm-card" style="margin-top:var(--mc-sp-4);">';
        if (c.metals) html += '<p class="mc-eyebrow" style="margin:0 0 6px">HARDWARE & METALS</p><p style="color:var(--mc-silver-bright);font-weight:600;margin:0 0 2px">' + esc(c.metals.locked || '') + '</p><p style="color:var(--mc-silver-mid);font-size:13px;margin:0;">' + esc(c.metals.note || '') + '</p>';
        if (c.stylingCorrections) html += '<p class="mc-eyebrow" style="margin:var(--mc-sp-4) 0 6px">STYLING CORRECTIONS</p><p style="color:var(--mc-silver-mid);font-size:13px;line-height:1.6;margin:0;">' + esc(c.stylingCorrections) + '</p>';
        html += '</div>';
      }
      if (c.cosmetic) {
        if (c.cosmetic.lipWardrobe && c.cosmetic.lipWardrobe.length) { html += '<p class="mc-eyebrow" style="margin:var(--mc-sp-5) 0 var(--mc-sp-3)">THE LIP WARDROBE</p><div class="lm-pal-grid">'; c.cosmetic.lipWardrobe.forEach(function (s) { html += paletteCard(s.hex, s.name, s.note); }); html += '</div>'; }
        if (c.cosmetic.complexion && c.cosmetic.complexion.length) { html += '<p class="mc-eyebrow" style="margin:var(--mc-sp-4) 0 var(--mc-sp-3)">COMPLEXION · CHEEK · EYE</p>'; c.cosmetic.complexion.forEach(function (it) { html += '<p style="margin:0 0 8px"><span style="color:var(--mc-silver-bright);font-weight:600">' + esc(it.area || '') + '</span> · <span style="color:var(--mc-silver-mid);font-size:13px">' + esc(it.directive || '') + '</span></p>'; }); }
        html += '<p style="color:var(--mc-silver-faint);font-size:11px;font-style:italic;margin-top:8px">Cosmetic guidance is calibrated to colour biology only and is independent of gender expression.</p>';
      }
    }

    var iv = report.intervention;
    if (iv) {
      html += sectionLabel('04 · THE 90-DAY INTERVENTION BLUEPRINT');
      html += '<p class="lm-block-intro">Each agent corrects a specific root cause. Items marked Rx are prescription-grade. Bring them to your dermatologist; do not self-source.</p>';
      [['Morning Protocol', iv.morning], ['Night Protocol', iv.night], ['Mechanical Arsenal', iv.mechanical]].forEach(function (b) {
        var steps = b[1]; if (!steps || !steps.length) return;
        html += '<p class="mc-eyebrow" style="margin:var(--mc-sp-4) 0 var(--mc-sp-3)">' + esc(b[0].toUpperCase()) + '</p>';
        html += '<div class="lm-card">';
        steps.forEach(function (s, i) {
          html += '<div class="lm-step"><span class="lm-step__n">' + String(i + 1).padStart(2, '0') + '</span><div>';
          html += '<div class="lm-step__agent">' + esc(s.agent || s.step || '') + (s.rx ? '<span class="lm-rx">Rx</span>' : '') + '</div>';
          if (s.spec) html += '<div class="lm-metric__sub">' + esc(s.spec) + '</div>';
          if (s.rationale) html += '<div class="lm-step__why">' + esc(s.rationale) + '</div>';
          html += '</div></div>';
        });
        html += '</div>';
      });
    }

    var p = report.projection;
    if (p && p.rows) {
      html += sectionLabel('05 · PROJECTED EVOLUTION');
      html += '<p class="lm-block-intro">Modelled 90-day outcome under strict adherence. Only actionable vectors move; fixed osseous geometry is held constant.</p>';
      html += '<div class="lm-card">';
      p.rows.forEach(function (r) {
        var pct = Math.max(4, Math.min(100, Number(r.day90) * 10));
        html += '<div class="lm-proj-row"><div style="flex:1;min-width:0;"><div class="lm-proj__name">' + esc(formatMetricName(r.vector)) + '</div><div class="lm-proj__track" style="margin-top:6px;"><i style="width:' + pct + '%"></i></div></div>'
          + '<span class="lm-proj__nums">' + Number(r.day0).toFixed(1) + ' → ' + Number(r.day90).toFixed(1) + ' <span class="lm-gain">+' + Number(r.delta).toFixed(1) + '</span></span></div>';
      });
      if (p.globalDay0 != null && p.globalDay90 != null) {
        html += '<div class="lm-proj__total"><span>GLOBAL AURA SCORE</span><span>' + Number(p.globalDay0).toFixed(1) + ' → ' + Number(p.globalDay90).toFixed(1) + ' <span class="lm-gain">+' + (Number(p.globalDay90) - Number(p.globalDay0)).toFixed(1) + '</span></span></div>';
      }
      html += '</div>';
      if (p.narrative) html += '<p class="mc-serif mc-serif--italic" style="font-size:var(--mc-fs-h3);margin:var(--mc-sp-5) 0 0;line-height:1.5;">' + esc(p.narrative) + '</p>';
    }

    if (report.methodology) {
      html += sectionLabel('METHODOLOGY, SAFETY & LIMITATIONS');
      html += '<p style="color:var(--mc-silver-faint);font-size:12px;line-height:1.6;">' + esc(report.methodology) + '</p>';
    }

    var bp = document.getElementById('blueprint-container');
    if (bp) {
      bp.innerHTML = html;
      // The blueprint is very tall; the scroll-reveal observer can never see 10%
      // of it at once, so reveal the container immediately (its children are not
      // reveal-gated). Without this it stays opacity:0 and the page looks empty.
      bp.classList.add('is-visible');
    }
    initReveal();
    if (window.mc) window.mc.track('lookmaxing_audit_viewed', { resolution: 'full' });
  }

  // ── Tick bar reveal on scroll ──
  function initReveal() {
    var reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (reducedMotion) {
      document.querySelectorAll('.lm-reveal').forEach(function (el) { el.classList.add('is-visible'); });
      return;
    }
    var observer = new IntersectionObserver(function (entries) {
      entries.forEach(function (e) {
        if (e.isIntersecting) {
          e.target.classList.add('is-visible');
          observer.unobserve(e.target);
        }
      });
    }, { threshold: 0, rootMargin: '0px 0px -10% 0px' });
    document.querySelectorAll('.lm-reveal').forEach(function (el) { observer.observe(el); });
  }

  // ── PDF download ──
  document.getElementById('pdf-btn').addEventListener('click', function () {
    var btn = this;
    btn.setAttribute('aria-busy', 'true');
    btn.disabled = true;
    btn.textContent = 'Building the PDF. Hold.';

    fetch('/api/lookmaxing/audit/' + auditId + '/pdf', { headers: authHeaders() })
      .then(function (res) {
        if (!res.ok) throw new Error('pdf failed');
        return res.json();
      })
      .then(function (data) {
        btn.setAttribute('aria-busy', 'false');
        btn.disabled = false;
        btn.textContent = 'PDF ready. ◆';
        if (data.url) {
          window.open(data.url, '_blank', 'noopener,noreferrer');
        }
      })
      .catch(function () {
        btn.setAttribute('aria-busy', 'false');
        btn.disabled = false;
        btn.textContent = 'Download the PDF';
      });
  });

  function capitalise(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : s; }

  function formatMetricName(s) {
    return s.replace(/([A-Z])/g, ' $1').replace(/^./, function (c) { return c.toUpperCase(); });
  }

  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  if (auditId) {
    loadFull();
  } else {
    loadingEl.hidden = true;
    errorEl.hidden = false;
  }
}());
</script>
</body>
</html>
