<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Arc — MainCharacter Dashboard</title>
<meta name="description" content="Track your Orator Protocol progress — scores, lexicon, chronicle, and rank.">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0E0E10;
    --bg-card: #16161A;
    --bg-card2: #1C1C22;
    --gold: #c0c0c0;
    --gold-bright: #e8e8e8;
    --gold-dim: rgba(255,255,255,0.15);
    --gold-glow: rgba(255,255,255,0.08);
    --text: #F5F0E8;
    --text-dim: #A09B8E;
    --text-faint: #6B665C;
    --border: rgba(255,255,255,0.12);
    --green: #4ADE80;
    --radius: 8px;
    --ease: cubic-bezier(0.22, 1, 0.36, 1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 24px 16px 60px;
    line-height: 1.6;
  }

  .container { max-width: 440px; margin: 0 auto; }

  /* Header */
  .dash-header {
    text-align: center;
    margin-bottom: 40px;
    animation: fadeUp 0.6s var(--ease) both;
  }
  .dash-logo {
    font-weight: 600;
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 24px;
  }
  .dash-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.8rem;
    font-weight: 400;
    margin-bottom: 6px;
  }
  .dash-rank {
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 8px;
  }
  .dash-meta {
    font-size: 0.78rem;
    color: var(--text-faint);
  }
  .dash-meta span { margin: 0 6px; }

  /* Section */
  .section {
    margin-bottom: 36px;
    animation: fadeUp 0.6s var(--ease) both;
  }
  .section:nth-child(2) { animation-delay: 0.1s; }
  .section:nth-child(3) { animation-delay: 0.2s; }
  .section:nth-child(4) { animation-delay: 0.3s; }
  .section:nth-child(5) { animation-delay: 0.4s; }

  .section-title {
    font-weight: 600;
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  /* Score bars */
  .score-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }
  .score-label {
    font-size: 0.78rem;
    color: var(--text-dim);
    min-width: 100px;
    flex-shrink: 0;
  }
  .score-bar-wrap {
    flex: 1;
    height: 6px;
    background: rgba(255,255,255,0.05);
    border-radius: 3px;
    overflow: hidden;
    position: relative;
  }
  .score-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--gold-dim), var(--gold));
    border-radius: 3px;
    width: 0;
    transition: width 1.5s var(--ease);
  }
  .score-values {
    font-size: 0.74rem;
    color: var(--text-dim);
    min-width: 90px;
    text-align: right;
    white-space: nowrap;
  }
  .score-delta {
    color: var(--green);
    font-weight: 600;
    margin-left: 4px;
  }

  /* Lexicon */
  .lexicon-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .word-tag {
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: var(--gold);
    cursor: pointer;
    transition: all 0.3s var(--ease);
    position: relative;
  }
  .word-tag:hover {
    background: var(--gold-dim);
    border-color: var(--gold);
  }
  .word-tag.mastered {
    background: var(--gold-dim);
    color: var(--gold-bright);
    border-color: var(--gold);
  }
  /* Tooltip */
  .word-tag .tooltip {
    display: none;
    position: absolute;
    bottom: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg-card2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 0.72rem;
    font-weight: 400;
    color: var(--text-dim);
    white-space: nowrap;
    max-width: 220px;
    white-space: normal;
    z-index: 10;
    pointer-events: none;
  }
  .word-tag:hover .tooltip { display: block; }

  .lexicon-count {
    font-size: 0.78rem;
    color: var(--text-faint);
    margin-bottom: 12px;
  }
  .lexicon-legend {
    display: flex;
    gap: 16px;
    margin-top: 12px;
    font-size: 0.72rem;
    color: var(--text-faint);
  }
  .legend-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
  }
  .legend-dot.forged { background: var(--gold); opacity: 0.4; }
  .legend-dot.mastered { background: var(--gold-bright); }

  /* Chronicle */
  .chronicle-entry {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: border-color 0.3s var(--ease);
  }
  .chronicle-entry:hover { border-color: var(--gold); }
  .chronicle-day {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .chronicle-preview {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.9rem;
    color: var(--text-dim);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .chronicle-full {
    display: none;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  .chronicle-full.open { display: block; }
  .chronicle-full .response-label {
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 6px;
  }
  .chronicle-full .response-text {
    font-size: 0.82rem;
    color: var(--text-dim);
    line-height: 1.6;
    margin-bottom: 12px;
  }

  /* Rank badge */
  .rank-badge {
    background: var(--bg-card);
    border: 1px solid var(--gold);
    border-radius: var(--radius);
    padding: 24px;
    text-align: center;
  }
  .rank-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.5rem;
    color: var(--gold-bright);
    margin-bottom: 8px;
  }
  .rank-desc {
    font-size: 0.82rem;
    color: var(--text-dim);
    margin-bottom: 16px;
  }
  .rank-next {
    font-size: 0.72rem;
    color: var(--text-faint);
  }

  /* CTAs */
  .cta-row {
    display: flex;
    gap: 12px;
    margin-top: 32px;
  }
  .cta-btn {
    flex: 1;
    padding: 14px 16px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: transparent;
    color: var(--gold);
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 0.82rem;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.3s var(--ease);
    text-decoration: none;
    text-align: center;
  }
  .cta-btn:hover {
    background: var(--gold-dim);
    border-color: var(--gold);
  }
  .cta-btn.primary {
    background: var(--gold-glow);
    border-color: var(--gold);
  }

  /* Loading */
  .loading {
    text-align: center;
    padding: 60px 0;
    color: var(--text-faint);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.1rem;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 380px) {
    .score-label { min-width: 80px; font-size: 0.72rem; }
    .score-values { min-width: 70px; font-size: 0.68rem; }
  }
</style>
</head>
<body>

<div class="container" id="dashboard">
  <div class="loading" id="loading-state">Loading your arc...</div>
</div>

<script>
(function() {
  const token = window.location.pathname.split('/dashboard/')[1];
  if (!token) {
    document.getElementById('loading-state').textContent = 'Dashboard not found.';
    return;
  }

  fetch(`/api/user/${token}`)
    .then(r => { if (!r.ok) throw new Error('Not found'); return r.json(); })
    .then(user => renderDashboard(user))
    .catch(() => {
      document.getElementById('loading-state').textContent = 'Dashboard not found.';
    });

  function renderDashboard(user) {
    const container = document.getElementById('dashboard');

    const rankLabels = {
      unawakened: 'THE UNAWAKENED',
      seeker: 'THE SEEKER ◆',
      ascendant: 'THE ASCENDANT ◆◆',
      luminary: 'THE LUMINARY ◆◆◆',
      sovereign: 'THE SOVEREIGN ◆◆◆◆',
    };
    const nextRanks = {
      unawakened: { name: 'The Seeker', at: 'Day 7' },
      seeker: { name: 'The Ascendant', at: 'Day 30' },
      ascendant: { name: 'The Luminary', at: 'Day 60' },
      luminary: { name: 'The Sovereign', at: 'Day 90' },
      sovereign: { name: 'Maximum Rank', at: 'Achieved' },
    };

    const day1 = user.scores.find(s => s.day === 1) || {};
    const latest = user.scores.length > 0 ? user.scores[user.scores.length - 1] : {};

    let html = '';

    // ─── Header ───
    html += `<div class="dash-header">
      <div class="dash-logo">◆ MAINCHARACTER</div>
      <div class="dash-name">${user.name}'s Arc</div>
      <div class="dash-rank">${rankLabels[user.rank] || 'THE UNAWAKENED'}</div>
      <div class="dash-meta">Day ${user.day} of 7<span>·</span>Streak: ${user.streak} days</div>
    </div>`;

    // ─── Scores ───
    if (user.scores.length > 0) {
      html += `<div class="section"><div class="section-title">Score Progress</div>`;
      
      const metrics = [
        { key: 'fluency', label: 'Fluency' },
        { key: 'confidenceTone', label: 'Confidence' },
        { key: 'vocabularyRange', label: 'Vocabulary' },
        { key: 'structure', label: 'Structure' },
      ];

      metrics.forEach(m => {
        const d1 = day1[m.key] || 0;
        const curr = latest[m.key] || 0;
        const delta = curr - d1;
        const deltaStr = user.scores.length > 1 ? `<span class="score-delta">${delta >= 0 ? '+' : ''}${delta}</span>` : '';

        html += `<div class="score-row">
          <div class="score-label">${m.label}</div>
          <div class="score-bar-wrap"><div class="score-bar" data-width="${curr}"></div></div>
          <div class="score-values">${d1} → ${curr} ${deltaStr}</div>
        </div>`;
      });

      html += `</div>`;
    }

    // ─── Lexicon ───
    if (user.wordsLearned.length > 0) {
      const mastered = user.wordsLearned.filter(w => w.status === 'mastered').length;
      html += `<div class="section">
        <div class="section-title">Your Lexicon</div>
        <div class="lexicon-count">${user.wordsLearned.length} words forged · ${mastered} mastered</div>
        <div class="lexicon-grid">`;

      user.wordsLearned.forEach(w => {
        const cls = w.status === 'mastered' ? 'mastered' : '';
        html += `<div class="word-tag ${cls}">
          ${w.word}
          <div class="tooltip">${w.definition}</div>
        </div>`;
      });

      html += `</div>
        <div class="lexicon-legend">
          <span><span class="legend-dot forged"></span>Forged</span>
          <span><span class="legend-dot mastered"></span>Mastered</span>
        </div>
      </div>`;
    }

    // ─── Chronicle ───
    if (user.chronicle.length > 0) {
      html += `<div class="section"><div class="section-title">Your Chronicle</div>`;

      user.chronicle.forEach((c, i) => {
        const date = new Date(c.timestamp).toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });
        const preview = (c.userResponse || '').substring(0, 120);

        html += `<div class="chronicle-entry" onclick="toggleChronicle(${i})">
          <div class="chronicle-day">Day ${c.day} · ${date}</div>
          <div class="chronicle-preview">"${preview}..."</div>
          <div class="chronicle-full" id="chronicle-${i}">
            <div class="response-label">Your Response</div>
            <div class="response-text">${c.userResponse || '—'}</div>
            <div class="response-label">The Consultant</div>
            <div class="response-text">${c.consultantResponse || '—'}</div>
          </div>
        </div>`;
      });

      html += `</div>`;
    }

    // ─── Rank Badge ───
    const next = nextRanks[user.rank] || nextRanks.sovereign;
    html += `<div class="section">
      <div class="section-title">Rank</div>
      <div class="rank-badge">
        <div class="rank-name">${rankLabels[user.rank] || 'THE UNAWAKENED'}</div>
        <div class="rank-desc">The journey has begun. Momentum is building.</div>
        <div class="rank-next">Next rank: ${next.name} · Unlocks at: ${next.at}</div>
      </div>
    </div>`;

    // ─── CTAs ───
    html += `<div class="cta-row">
      <button class="cta-btn" onclick="shareArc()">Share My Arc ↗</button>
      <a href="https://wa.me/919958533994?text=CONTINUE" class="cta-btn primary">Continue Protocol →</a>
    </div>`;

    container.innerHTML = html;

    // Animate score bars
    setTimeout(() => {
      document.querySelectorAll('.score-bar').forEach(bar => {
        bar.style.width = bar.dataset.width + '%';
      });
    }, 200);
  }

  window.toggleChronicle = function(i) {
    const el = document.getElementById('chronicle-' + i);
    if (el) el.classList.toggle('open');
  };

  window.shareArc = function() {
    if (navigator.share) {
      navigator.share({
        title: 'My MainCharacter Arc',
        text: 'I just completed The Orator Protocol. See my evolution.',
        url: window.location.href,
      }).catch(() => {});
    } else {
      navigator.clipboard.writeText(window.location.href).then(() => {
        alert('Dashboard link copied.');
      });
    }
  };
})();
</script>

</body>
</html>
