<!doctype html>
<!-- TODO copy review — Night-3 audit confirmation; Consultant voice, drafted to brief -->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MainCharacter — Your Aesthetic Audit</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;1,500&family=Sora:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body style="margin:0;padding:0;background:#070708;color:#f4f1ea;font-family:'Sora',Arial,sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#070708;padding:40px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:560px;background:#0d0d0f;border:1px solid #1d1d20;border-radius:14px;overflow:hidden;">
            <tr>
              <td style="padding:40px 40px 8px;text-align:center;">
                <div style="color:#9a9aa4;letter-spacing:3px;font-size:12px;text-transform:uppercase;">◆ MainCharacter · Lookmaxxing</div>
              </td>
            </tr>
            <tr>
              <td style="padding:16px 40px 8px;">
                <h1 style="font-family:'Cormorant Garamond',Georgia,serif;font-style:italic;font-weight:500;color:#f4f1ea;font-size:32px;line-height:1.2;margin:0;text-align:center;">
                  Your audit is saved, {{name}}.
                </h1>
              </td>
            </tr>
            <tr>
              <td style="padding:8px 40px 24px;text-align:center;color:#b9b6ae;font-size:15px;line-height:1.7;">
                Your reading is held for you. Return to it whenever you are ready — the link below is yours alone.
              </td>
            </tr>
            <tr>
              <td style="padding:8px 40px 28px;text-align:center;">
                <a href="{{resultUrl}}" style="display:inline-block;background:#9a9aa4;color:#070708;text-decoration:none;font-weight:600;font-size:14px;padding:14px 32px;border-radius:8px;">
                  View your Aura reading
                </a>
              </td>
            </tr>
            <tr>
              <td style="padding:0 40px 40px;text-align:center;color:#5f5d58;font-size:12px;line-height:1.6;">
                This link expires when your audit session does.<br />
                ◆ MainCharacter · The Consultant
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
