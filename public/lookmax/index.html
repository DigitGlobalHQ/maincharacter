<!doctype html>
<!-- Lookmaxxing dashboard home (Night-4, P7.1 + NOW-3). -->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Lookmaxxing</title>
  <link rel="manifest" href="/lookmax/manifest.json" />
  <meta name="theme-color" content="#070708" />
  <link rel="apple-touch-icon" href="/lookmax/icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/lookmax/app.css" />
  <!-- B4: VAPID public key — server populates this via /api/lookmax/vapid-key;
       the JS reads it at runtime. Empty value = push prompt suppressed. -->
  <meta name="vapid-public-key" id="vapidPublicKeyMeta" content="" />
  <script src="/track.js" defer></script>
  <style>
    /* ── Canonical Aura Score Object (mc-aura-obj)
       Shared identical classes with public/lookmaxing/audit.html.
       Used here for the saved Aura Reading card on the dashboard.
       Builder: buildAuraScoreObject({score, rank}) — defined in the script below.
    ── */
    .mc-aura-obj {
      position: relative;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .mc-aura-obj__ring-wrap {
      position: relative;
      width: 120px;
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .mc-aura-obj__ring {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: visible;
    }
    .mc-aura-obj__track {
      fill: none;
      stroke: var(--silver-ghost, #2a2a2a);
      stroke-width: 1.5;
    }
    .mc-aura-obj__arc {
      fill: none;
      stroke: url(#mc-aura-silver-grad-db);
      stroke-width: 1.5;
      stroke-linecap: round;
      transform-origin: 50% 50%;
      transform: rotate(-90deg);
      transition: stroke-dasharray 1.2s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @media (prefers-reduced-motion: reduce) {
      .mc-aura-obj__arc { transition: none; }
    }
    .mc-aura-obj__dot {
      fill: #ffffff;
      filter: drop-shadow(0 0 5px rgba(255,255,255,0.7)) drop-shadow(0 0 10px rgba(255,255,255,0.4));
    }
    .mc-aura-obj__numeral {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.75rem;
      font-weight: 400;
      line-height: 1;
      letter-spacing: -0.02em;
      background: var(--silver-gradient, linear-gradient(180deg,var(--mc-silver-bright,#e8e8e8) 0%,var(--mc-silver-mid,#c0c0c0) 48%,var(--mc-silver-dim,#8a8a8a) 100%));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
      display: block;
      position: relative;
      z-index: 1;
    }
    /* "/ 100" — JetBrains Mono (instrument precision) */
    .mc-aura-obj__denom {
      font-family: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
      font-size: 11px;
      letter-spacing: 0.16em;
      color: var(--mc-silver-faint, var(--mc-silver-faint,#5a5a5a));
    }
    /* Rank label — JetBrains Mono */
    .mc-aura-obj__rank {
      font-family: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
      font-size: 11px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--mc-silver-mid, var(--mc-silver-mid,#c0c0c0));
      display: block;
    }

    /* ── Mono data numerals — instrument upgrade (visual-system-audit Part C Step 3)
       All data: timeline scores, axis numbers, deltas, "/100", mirror count, hair score.
    ── */
    .mc-mono-numeral {
      font-family: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
      letter-spacing: 0.02em;
    }

    /* ── Mirror primary card ─────────────────────────────── */
    .card--mirror-primary {
      border-top: 3px solid var(--gold);
      min-height: 140px;
      padding: 28px 22px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .card--mirror-primary h3 {
      font-size: 22px;
    }

    /* ── Secondary tile row (Protocol + Hair) ────────────── */
    .tile-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }
    .tile-row .card {
      margin-bottom: 0;
    }

    /* ── Cross-sell slot card ─────────────────────────────── */
    .card--cross-sell {
      border-top: 3px solid var(--gold);
      animation: fadeIn 0.4s ease both;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @media (prefers-reduced-motion: reduce) {
      .card--cross-sell { animation: none; }
      .card--mirror-primary.card--pulse { animation: none; }
    }
    .cross-sell__body {
      font-size: 15px;
      color: var(--ink);
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      line-height: 1.5;
      margin-bottom: 10px;
    }
    .cross-sell__save {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 14px;
    }
    .cross-sell__dismiss {
      display: inline-block;
      min-height: 44px;
      padding: 12px 16px;
      background: transparent;
      border: none;
      color: var(--muted);
      font-family: 'Sora', sans-serif;
      font-size: 13px;
      cursor: pointer;
      text-align: center;
      width: 100%;
      margin-top: 6px;
    }
    .cross-sell__dismiss:hover { color: var(--ink); }

    /* ── Your Journey section ───────────────────────────────────────── */
    /* Section header */
    .journey-header {
      margin-top: 32px;
      margin-bottom: 16px;
      border-top: 1px solid var(--line);
      padding-top: 20px;
    }
    .journey-eyebrow {
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .journey-subhead {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 500;
      font-size: 22px;
      color: var(--ink);
    }

    /* Timeline rail */
    .timeline-rail {
      position: relative;
      padding-left: 24px;
    }
    .timeline-rail::before {
      content: '';
      position: absolute;
      left: 4px;
      top: 8px;
      bottom: 8px;
      width: 1px;
      background: var(--line);
    }
    .timeline-node {
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      font-size: 10px;
      color: var(--gold);
      opacity: 0.85;
      line-height: 1;
      width: 10px;
      text-align: center;
    }
    .timeline-node.current {
      opacity: 1;
    }
    .timeline-item {
      position: relative;
      list-style: none;
      margin-bottom: 0;
    }
    .timeline-item:not(:last-child) {
      border-bottom: 1px solid var(--line);
    }
    .timeline-link {
      display: block;
      min-height: 44px;
      padding: 14px 0 14px 0;
      text-decoration: none;
      color: inherit;
    }
    .timeline-link:focus-visible {
      outline: 2px solid var(--gold);
      outline-offset: 2px;
      border-radius: 4px;
    }
    .timeline-link:hover .timeline-view {
      opacity: 1;
    }
    .timeline-meta {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 4px;
    }
    .timeline-label {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 16px;
      color: var(--ink);
    }
    .timeline-date {
      font-family: 'Sora', sans-serif;
      font-size: 12px;
      color: var(--muted);
    }
    .timeline-score-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    .timeline-score {
      font-family: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
      font-weight: 400;
      font-size: 24px;
      line-height: 1;
      color: var(--mc-silver-bright, var(--mc-silver-bright,#e8e8e8));
      letter-spacing: -0.02em;
    }
    .timeline-rank {
      font-family: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      margin-left: 10px;
    }
    .timeline-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }
    .timeline-delta {
      font-family: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
      font-size: 11px;
      letter-spacing: 0.02em;
    }
    .timeline-delta.up { color: var(--good); }
    .timeline-delta.down { color: var(--bad); }
    .timeline-delta.neutral { color: var(--muted); }
    .timeline-view {
      font-family: 'Sora', sans-serif;
      font-size: 13px;
      color: var(--gold);
      opacity: 0.85;
    }
    .timeline-showmore {
      display: block;
      background: none;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--muted);
      font-family: 'Sora', sans-serif;
      font-size: 13px;
      cursor: pointer;
      padding: 10px 16px;
      min-height: 44px;
      width: 100%;
      margin-top: 12px;
      text-align: center;
    }
    .timeline-showmore:hover { color: var(--ink); }
    .timeline-showmore:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

    /* Sparkline SVG (Module 2 + 5) */
    .sparkline-wrap {
      width: 100%;
      overflow: visible;
      display: block;
    }
    .sparkline-summary {
      font-family: 'Sora', sans-serif;
      font-size: 13px;
      margin-top: 10px;
    }
    .sparkline-summary.up { color: var(--good); }
    .sparkline-summary.down { color: var(--bad); }
    .sparkline-summary.neutral { color: var(--muted); }
    .sparkline-caption {
      font-family: 'Sora', sans-serif;
      font-size: 13px;
      color: var(--muted);
      margin-top: 10px;
    }

    /* 8-Axis bars (Module 3) */
    .axis-journey {
      margin-bottom: 12px;
    }
    .axis-journey:last-child { margin-bottom: 0; }
    .axis-journey-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 5px;
    }
    .axis-journey-label {
      font-family: 'Sora', sans-serif;
      font-size: 14px;
      color: var(--ink);
    }
    .axis-journey-scores {
      font-family: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
      font-size: 11px;
      letter-spacing: 0.02em;
      color: var(--muted);
    }
    .axis-journey-scores .now-val { color: var(--ink); }
    .axis-journey-bar {
      position: relative;
      height: 7px;
      border-radius: 4px;
      background: var(--line);
      overflow: visible;
      margin-bottom: 4px;
    }
    .axis-journey-bar .base-fill {
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      border-radius: 4px;
      background: rgba(192,192,192,0.22);
      width: 0;
      transition: width .9s ease;
    }
    .axis-journey-bar .gain-fill {
      position: absolute;
      top: 0;
      height: 100%;
      border-radius: 0 4px 4px 0;
      background: var(--gold);
      width: 0;
      transition: width .9s ease .1s;
    }
    .axis-journey-bar .now-fill {
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      border-radius: 4px;
      background: rgba(192,192,192,0.22);
      width: 0;
      transition: width .9s ease;
    }
    .axis-journey-delta {
      font-family: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
      font-size: 11px;
      letter-spacing: 0.02em;
    }
    .axis-journey-delta.up { color: var(--good); }
    .axis-journey-delta.down { color: var(--bad); }
    .axis-journey-delta.neutral { color: var(--muted); }

    /* Mirror heatmap (Module 4) */
    .mirror-count-big {
      font-family: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
      font-weight: 400;
      font-size: 44px;
      line-height: 1;
      color: var(--mc-silver-bright, var(--mc-silver-bright,#e8e8e8));
      display: block;
      letter-spacing: -0.02em;
    }
    .mirror-count-label {
      font-family: 'Sora', sans-serif;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 20px;
    }
    .heatmap-month-nav {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }
    .heatmap-month-label {
      font-family: 'Sora', sans-serif;
      font-size: 14px;
      color: var(--ink);
      flex: 1;
    }
    .heatmap-chevron {
      background: none;
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--muted);
      font-size: 15px;
      cursor: pointer;
      min-width: 44px;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color .18s;
    }
    .heatmap-chevron:hover { color: var(--ink); }
    .heatmap-chevron:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }
    .heatmap-chevron:disabled { opacity: 0.3; cursor: default; }
    .heatmap-dow {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      margin-bottom: 6px;
    }
    .heatmap-dow span {
      font-family: 'Sora', sans-serif;
      font-size: 11px;
      color: var(--muted);
      text-align: center;
    }
    .heatmap-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
    .heatmap-dot {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 50%;
      border: 1px solid var(--line);
      background: transparent;
    }
    .heatmap-dot.on {
      background: var(--gold);
      border-color: var(--gold);
    }
    .heatmap-dot.empty {
      border-color: transparent;
      background: transparent;
    }
    .mirror-streak-line {
      font-family: 'Sora', sans-serif;
      font-size: 13px;
      color: var(--muted);
      margin-top: 14px;
    }

    /* Hair trend (Module 5) */
    .hair-top-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
    }
    .hair-score-big {
      font-family: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
      font-weight: 400;
      font-size: 28px;
      color: var(--mc-silver-bright, var(--mc-silver-bright,#e8e8e8));
      line-height: 1;
      letter-spacing: -0.02em;
    }
    .hair-norwood {
      font-family: 'Sora', sans-serif;
      font-size: 14px;
      color: var(--ink);
    }
    .hair-stage-caption {
      font-family: 'Sora', sans-serif;
      font-size: 13px;
      color: var(--muted);
      margin-top: 12px;
    }

    /* Journey skeleton loading */
    .journey-skeleton {
      min-height: 140px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
    }
    .journey-skeleton::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.03) 50%, transparent 100%);
      animation: skeletonShimmer 1.4s ease infinite;
    }
    @keyframes skeletonShimmer {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }
    @media (prefers-reduced-motion: reduce) {
      .journey-skeleton::after { animation: none; }
      .axis-journey-bar .base-fill,
      .axis-journey-bar .gain-fill,
      .axis-journey-bar .now-fill { transition: none; }
    }

    /* Journey section fade-in (reuse existing fadeIn keyframe) */
    #journey-section { animation: fadeIn 0.4s ease both; }
    @media (prefers-reduced-motion: reduce) {
      #journey-section { animation: none; }
    }
  </style>
</head>
<body>
  <div class="page" id="page">
    <div class="topbar">
      <div class="who">◆ MainCharacter · Lookmaxxing<br /><b id="whoName">…</b></div>
      <div class="badges">
        <span class="badge badge--streak" id="streakBadge">Day 0</span>
        <span class="badge badge--level" id="levelBadge">Raw</span>
        <button type="button" id="signOutBtn" aria-label="Sign out"
          style="background:none;border:none;cursor:pointer;font-family:inherit;font-size:0.72rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);padding:4px 0;">Sign out</button>
      </div>
    </div>

    <!-- Saved Aura Reading (funnel-repair Item 1): preserved free reading from
         the audit, shown when the user chose "Maybe later". Empty until fetched. -->
    <div id="aura-reading-slot"></div>

    <!-- Primary Mirror tile (full-width, promoted) -->
    <div id="tile-mirror"></div>

    <!-- Secondary tiles: Protocol + Hair in 2-col grid -->
    <div class="tile-row" id="tile-row"></div>

    <!-- Week strip card -->
    <div class="card">
      <div class="muted" style="font-size:12px;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px">This week</div>
      <div class="weekstrip" id="weekstrip"></div>
    </div>

    <!-- Cross-sell slot (NOW-3 earned-moment; empty until eligibility check) -->
    <div id="cross-sell-slot"></div>

    <!-- B4: Push subscription prompt (shown after ≥3 mirrors, once, if not subscribed) -->
    <div id="push-prompt-slot"></div>

    <!-- Your Journey — history + analytics section. Rendered by renderJourney(). -->
    <div id="journey-section"></div>

    <p class="footer-note">The mirror has been honest. ◆ MainCharacter</p>
  </div>

  <script src="/lookmax/app.js"></script>
  <script>
    (async function () {
      const user = await LM.requireSession();
      if (!user) return; // requireSession redirects to /lookmax/login
      LM.renderNav('profile');

      // ── Saved Aura Reading (funnel-repair Item 1) ──────────────────────────
      // The audit free reading is persisted server-side on the user's session.
      // If we have its id, surface it here so "Maybe later" lands on a preserved
      // reading the user can return to and resolve.
      renderAuraReading().catch(() => {});

      // ── Your Journey section — independent fetch, fails silently ───────────
      renderJourney().catch(() => {});

      let d;
      try { d = await LM.api('/api/lookmax/dashboard'); }
      catch { d = null; }
      if (!d) return;

      document.getElementById('whoName').textContent = d.user.name || 'Seeker';
      document.getElementById('streakBadge').textContent = 'Day ' + (d.streak || 0);
      document.getElementById('levelBadge').textContent = levelLabel(d.mirrorLevel);

      // ── Primary Mirror tile (full-width) ────────────────────────────────
      const t = d.today || {};
      let mirrorHtml;
      if (t.mirror && t.mirror.takenToday) {
        mirrorHtml = mirrorTile(
          `Today's score ${t.mirror.score} · Taken at ${t.mirror.at} ✓`,
          false
        );
      } else {
        mirrorHtml = mirrorTile("Take today's mirror →", true);
      }
      document.getElementById('tile-mirror').innerHTML = mirrorHtml;

      // ── Secondary tiles row ─────────────────────────────────────────────
      const p = t.protocol || {};
      const h = t.hair || {};
      const protocolTile = secondaryTile(
        'Protocol',
        `${p.completedCount || 0} of ${p.totalCount || 0} complete`,
        '/lookmax/protocol',
        false,
        p.totalCount ? (p.completedCount / p.totalCount) : 0,
        'protocol_tile_clicked'
      );
      const hairTile = h.unlocked
        ? secondaryTile('Hair', "Take this week's hair audit →", '/lookmax/hair', true, null, 'hair_tile_clicked', 'unlocked')
        : secondaryTile('Hair', `Next reading in ${h.daysUntil != null ? h.daysUntil : 7} days`, '/lookmax/hair', false, null, 'hair_tile_clicked', 'locked');
      document.getElementById('tile-row').innerHTML = protocolTile + hairTile;

      // ── Week strip ──────────────────────────────────────────────────────
      const week = d.thisWeek || [];
      document.getElementById('weekstrip').innerHTML = week.map(
        (on) => `<span class="dot ${on ? 'on' : ''}"></span>`
      ).join('');

      // ── Cross-sell slot (NOW-3 §2.2 earned-moment) ──────────────────────
      // Silence guarantee: if dismissed, never show again.
      const dismissed = localStorage.getItem('cross_sell_orator_dismissed');
      // 30-day re-show suppression after click
      const clickedAt = localStorage.getItem('cross_sell_orator_clicked_at');
      const clickedRecently = clickedAt && (Date.now() - Number(clickedAt)) < 30 * 86400000;

      if (
        d.crossSellEligible &&
        !dismissed &&
        !clickedRecently &&
        !d.user.oratorActive
      ) {
        renderCrossSell();
      }

      // Track dashboard viewed
      if (window.mc) {
        window.mc.track('dashboard_viewed', {
          mirrorLevel: d.mirrorLevel,
          daysSincePayment: null,
          lookmaxxingActive: d.user.lookmaxxingActive,
        });
      }

      // B4: Check if we should show the push notification prompt
      // Only after ≥3 mirrors this week (d.thisWeek is the 7-day strip)
      const mirrorCount = (d.thisWeek || []).filter(Boolean).length;
      maybeShowPushPrompt(mirrorCount);
    })();

    // ── Mirror primary tile builder ─────────────────────────────────────────
    function mirrorTile(sub, pulse) {
      return `<a href="/lookmax/mirror"
        class="card card--mirror-primary card--cta ${pulse ? 'card--pulse' : ''}"
        style="display:block;text-decoration:none;color:inherit;margin-bottom:16px"
        data-event="mirror_tile_clicked"
        data-state="${pulse ? 'empty' : 'taken'}"
        aria-label="Daily Mirror">
        <h3>Mirror</h3>
        <p class="muted" style="font-size:14px">${sub}</p>
      </a>`;
    }

    // ── Secondary tile builder ──────────────────────────────────────────────
    function secondaryTile(title, sub, href, pulse, progress, eventName, state) {
      const bar = progress != null
        ? `<div class="bar" style="margin-top:10px"><span style="width:${Math.round(progress * 100)}%"></span></div>`
        : '';
      const stateAttr = state ? `data-state="${state}"` : '';
      return `<a href="${href}"
        class="card card--look card--cta ${pulse ? 'card--pulse' : ''}"
        style="display:block;text-decoration:none;color:inherit"
        data-event="${eventName}"
        ${stateAttr}
        aria-label="${title}">
        <h3>${title}</h3>
        <p class="muted" style="font-size:14px">${sub}</p>

    // ── Canonical Aura Score Object builder (shared with public/lookmaxing/audit.html) ──
    // Returns HTML string for the score ring + numeral + "/ 100" + rank label.
    // Identical pattern to audit.html buildAuraScoreObject — call sites see the same object.
    // Uses a distinct SVG gradient id (-db suffix) to avoid collision when both pages are cached.
    function buildAuraScoreObject(opts) {
      var score = Math.max(0, Math.min(100, opts.score || 0));
      var rank  = opts.rank  || '';
      var reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      // Ring geometry (matches 120px container; SVG viewBox is 160×160, scaled by CSS)
      var cx = 80; var cy = 80; var r = 66;
      var circ = 2 * Math.PI * r;
      var filled = reducedMotion ? (score / 100) * circ : 0;
      var gap = circ - filled;
      var targetFilled = (score / 100) * circ;
      var targetGap    = circ - targetFilled;

      var angleDeg = -90 + (score / 100) * 360;
      var angleRad = (angleDeg * Math.PI) / 180;
      var dotCx = (cx + r * Math.cos(angleRad)).toFixed(2);
      var dotCy = (cy + r * Math.sin(angleRad)).toFixed(2);

      return (
        '<div class="mc-aura-obj" data-score="' + score + '" data-target-filled="' + targetFilled.toFixed(2) + '" data-target-gap="' + targetGap.toFixed(2) + '">' +
          '<div class="mc-aura-obj__ring-wrap">' +
            '<svg class="mc-aura-obj__ring" viewBox="0 0 160 160" aria-hidden="true">' +
              '<defs>' +
                '<linearGradient id="mc-aura-silver-grad-db" x1="0%" y1="0%" x2="0%" y2="100%">' +
                  '<stop offset="0%" stop-color="#e8e8e8"/>' +
                  '<stop offset="48%" stop-color="#c0c0c0"/>' +
                  '<stop offset="100%" stop-color="#8a8a8a"/>' +
                '</linearGradient>' +
              '</defs>' +
              '<circle class="mc-aura-obj__track" cx="' + cx + '" cy="' + cy + '" r="' + r + '"/>' +
              '<circle class="mc-aura-obj__arc" id="mc-aura-arc-db"' +
                ' cx="' + cx + '" cy="' + cy + '" r="' + r + '"' +
                ' stroke-dasharray="' + filled.toFixed(2) + ' ' + gap.toFixed(2) + '"' +
              '/>' +
              '<circle class="mc-aura-obj__dot" id="mc-aura-dot-db"' +
                ' cx="' + (reducedMotion ? dotCx : cx) + '" cy="' + (reducedMotion ? dotCy : (cy - r)) + '" r="4"' +
              '/>' +
            '</svg>' +
            '<span class="mc-aura-obj__numeral" id="mc-aura-numeral-db">' + (reducedMotion ? score : '0') + '</span>' +
          '</div>' +
          '<span class="mc-aura-obj__denom">/ 100</span>' +
          '<span class="mc-aura-obj__rank">' + rank.toUpperCase() + '</span>' +
        '</div>'
      );
    }

    // Animate the score arc and numeral count-up (dashboard variant).
    function animateAuraScoreObject(finalScore) {
      var reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (reducedMotion) return;

      var obj = document.querySelector('.mc-aura-obj');
      if (!obj) return;
      var arc   = document.getElementById('mc-aura-arc-db');
      var dot   = document.getElementById('mc-aura-dot-db');
      var numEl = document.getElementById('mc-aura-numeral-db');
      if (!arc || !dot || !numEl) return;

      var targetFilled = parseFloat(obj.getAttribute('data-target-filled'));
      var r = 66; var cx = 80; var cy = 80;
      var circ = 2 * Math.PI * r;

      var duration = 1200;
      var startTime = null;
      function animate(ts) {
        if (!startTime) startTime = ts;
        var progress = Math.min((ts - startTime) / duration, 1);
        var eased = 1 - Math.pow(1 - progress, 3);
        var current = Math.round(eased * finalScore);
        var currentFilled = (current / 100) * circ;
        var currentGap    = circ - currentFilled;

        numEl.textContent = current;
        arc.setAttribute('stroke-dasharray', currentFilled.toFixed(2) + ' ' + currentGap.toFixed(2));

        var angleDeg = -90 + (current / 100) * 360;
        var angleRad = (angleDeg * Math.PI) / 180;
        dot.setAttribute('cx', (cx + r * Math.cos(angleRad)).toFixed(2));
        dot.setAttribute('cy', (cy + r * Math.sin(angleRad)).toFixed(2));

        if (progress < 1) requestAnimationFrame(animate);
      }
      requestAnimationFrame(animate);
    }

    // ── Saved Aura Reading card (funnel-repair Item 1) ─────────────────────────
    // Uses the canonical mc-aura-obj score object — same visual as the audit reading.
    function escapeHtml(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) { return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]; }); }
    async function renderAuraReading() {
      const auditId = localStorage.getItem('lookmax.auditId');
      const slot = document.getElementById('aura-reading-slot');
      if (!auditId || !slot) return;
      const token = LM.getToken();
      if (!token) return;

          headers: { 'Authorization': 'Bearer ' + token },
        });
        if (!res.ok) return; // no reading to show (e.g. expired) — fail quietly
        data = await res.json();
      } catch (e) { return; }
      const r = data && data.report;
      if (!r || typeof r.auraScore !== 'number') return;

      const signals = (r.freeSignals || []).map(function (s) { return escapeHtml(s.label); }).join('  ·  ');
      const rank = escapeHtml(r.rank || '');
      const face = escapeHtml(r.faceShape || '');
      const paid = !!data.paid;
      const ctaHref = paid ? ('/lookmaxing/audit/' + auditId + '/full') : ('/lookmaxing/audit/' + auditId);
      const ctaLabel = paid ? 'View your full reading ◆' : 'Resolve the reading ◆';

      // Canonical score object — identical structure to the audit reading surface.
      const scoreObjHtml = buildAuraScoreObject({ score: r.auraScore, rank: rank });

      slot.innerHTML =
        '<a href="' + ctaHref + '" class="card card--cta" data-event="dashboard_aura_reading_clicked" ' +
        'style="display:block;text-decoration:none;color:inherit;margin-bottom:16px" aria-label="Your Aura Reading">' +
          '<div class="muted" style="font-size:11px;letter-spacing:0.16em;text-transform:uppercase;margin-bottom:12px">Your Aura Reading</div>' +
          '<div style="display:flex;align-items:center;gap:16px">' +
            scoreObjHtml +
            '<div>' +
              (face ? '<p class="muted" style="font-family:\'JetBrains Mono\',monospace;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;margin-bottom:6px">' + escapeHtml(face) + '</p>' : '') +
              (signals ? '<p class="muted" style="font-size:13px;margin-bottom:10px">' + signals + '</p>' : '') +
              '<p style="font-size:13px">' + ctaLabel + '</p>' +

      // Animate the score ring on first paint

    // ── B4: Push notification subscription prompt ──────────────────────────────
    // Shown once when: ≥3 mirrors completed AND push not yet subscribed AND not dismissed.
    // VAPID public key: fetched from /api/lookmax/push/vapid-key (returns '' when unconfigured).
    // Copy: deferred — see TODO copy below.
    async function maybeShowPushPrompt(mirrorCount) {
      // Eligibility gate: need at least 3 completed mirrors
      if ((mirrorCount || 0) < 3) return;

      // Only works if service worker + push are supported
      if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;

      // Silence if already dismissed
      if (localStorage.getItem('lookmax.push_dismissed')) return;

      // Silence if already subscribed (check SW registration)
      try {
        const reg = await navigator.serviceWorker.ready;
        const existing = await reg.pushManager.getSubscription();
        if (existing) return; // already subscribed
      } catch {
        return;
      }

      // Fetch the VAPID public key (returns { publicKey: '' } when unconfigured)
      try {
        const token = localStorage.getItem('lookmax.token');
        const kRes = await fetch('/api/lookmax/push/vapid-key', {
          headers: token ? { Authorization: `Bearer ${token}` } : {},
        });
        if (!kRes.ok) return;
        const { publicKey } = await kRes.json();
        if (!publicKey) return; // VAPID not configured — skip prompt
        renderPushPrompt(publicKey);
      } catch {
        // Network error — skip silently
      }
    }

    function renderPushPrompt(vapidKey) {
      const slot = document.getElementById('push-prompt-slot');
      if (!slot) return;

      slot.innerHTML = `<div class="card" role="complementary" aria-label="Enable notifications" data-event="push_prompt_shown" style="border-top:3px solid var(--gold)">
        <p style="font-family:'Cormorant Garamond',serif;font-style:italic;font-size:16px;margin-bottom:10px">
          <!-- TODO copy review: push prompt body line — deferred pending copy-consultant approval -->
          Wake at 7:45. The mirror is open.
        </p>
        <button
          class="btn btn--solid"
          id="pushAcceptBtn"
          data-event="push_subscribed"
          aria-label="Enable mirror reminder notification"
          style="width:100%;margin-bottom:8px">Enable reminder</button>
        <button
          class="cross-sell__dismiss"
          id="pushDismissBtn"
          data-event="push_dismissed"
          aria-label="Dismiss notification prompt">Not now</button>
      </div>`;

      if (window.mc) window.mc.track('push_prompt_shown', {});

      document.getElementById('pushAcceptBtn').addEventListener('click', async function () {
        try {
          const reg = await navigator.serviceWorker.ready;
          const sub = await reg.pushManager.subscribe({
            userVisibleOnly: true,
            applicationServerKey: urlB64ToUint8Array(vapidKey),
          });
          // POST subscription to server
          const token = localStorage.getItem('lookmax.token');
          await fetch('/api/lookmax/push/subscribe', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              ...(token ? { Authorization: `Bearer ${token}` } : {}),
            },
            body: JSON.stringify({ subscription: sub.toJSON() }),
          });
          if (window.mc) window.mc.track('push_subscribed', {});
          slot.innerHTML = '';
        } catch (err) {
          // Subscribe failed (permission denied or unsupported) — silently remove the prompt
          slot.innerHTML = '';
        }
      });

      document.getElementById('pushDismissBtn').addEventListener('click', function () {
        localStorage.setItem('lookmax.push_dismissed', '1');
        if (window.mc) window.mc.track('push_dismissed', {});
        slot.innerHTML = '';
      });
    }

    /** Convert a base64url VAPID public key to a Uint8Array for pushManager.subscribe. */
    function urlB64ToUint8Array(base64String) {
      const padding = '='.repeat((4 - (base64String.length % 4)) % 4);
      const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
      const rawData = atob(base64);
      return Uint8Array.from([...rawData].map((c) => c.charCodeAt(0)));
    }

    // ── Your Journey section ───────────────────────────────────────────────────
    // Fetches GET /api/lookmax/me/history and renders 5 history modules.
    // Fails silently — the "today" dashboard above must never be blocked.
    //
    // COPY APPROVED 2026-06-02 — strings in JOURNEY_COPY below are founder-approved
    // (see COPY_APPROVAL_2026-06-02.md).
    /* eslint-disable */
    const JOURNEY_COPY = {
      sectionEyebrow:    'YOUR JOURNEY',
      sectionSubhead:    'Every reading, in order.',
      timelineEyebrow:   'YOUR READINGS',
      timelineSingular:  '1 reading',
      timelinePlural:    (n) => `${n} readings`,
      rowBaseline:       'Baseline reading',
      rowReaudit:        'Re-audit',
      rowView:           'View ◆',
      showAll:           'Show all readings ◆',
      auraTitle:         'AURA OVER TIME',
      auraOnePoint:      'One reading so far. The line begins at your next.',
      auraSummaryUp:     (n) => `+${n} since baseline`,
      auraSummaryDown:   (n) => `${n} since baseline`,
      auraSummaryFlat:   'No change since baseline.',
      axesTitle:         'WHERE YOU\'VE MOVED',
      axesSubhead:       'Baseline → Now',
      axesTeaser:        'Your 8-axis comparison appears after your first re-audit.',
      mirrorTitle:       'THE MIRROR, OVER TIME',
      mirrorCountLabel:  'mornings logged',
      mirrorZeroCaption: 'Your first morning is waiting.',
      mirrorStreak:      (n) => `Longest streak: ${n} days`,
      hairTitle:         'HAIRLINE',
      hairOneReading:    'Tracking begins now.',
      hairStageHeld:     (stage, n) => `Stage held at ${stage} for ${n} reading${n !== 1 ? 's' : ''}.`,
      firstChapterQuote: 'This is your baseline. Everything after this is movement.',
      firstChapterNext:  (n) => `Your next reading unlocks in ${n} days.`,
      firstChapterDefault: 'Your re-audit unlocks after 30 days.',
      errorRetry:        'Couldn\'t load your journey. Retry ◆',
    };
    /* eslint-enable */

    // Axis key → human label map (locked to the 8 keys the audit returns).
    // COPY APPROVED 2026-06-02 — display labels founder-approved.
    const AXIS_LABELS = {
      skinClarity:    'Skin clarity',
      jawDefinition:  'Jaw definition',
      eyeArea:        'Eye area',
      hairDensity:    'Hair density',
      posture:        'Posture',
      facialHarmony:  'Facial harmony',
      expression:     'Expression',
      bodyComposition:'Body composition',
      // Legacy axis keys present in some audit sessions — kept for back-compat:
      symmetry:       'Symmetry',
      hairlineScore:  'Hairline',
      leanness:       'Leanness',
      grooming:       'Grooming',
    };

    // Month abbreviations for date formatting.
    const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const MONTHS_FULL  = ['January','February','March','April','May','June','July','August','September','October','November','December'];

    function fmtDate(iso) {
      // "DD Mon YY" — e.g. "03 Apr 26"
      const d = new Date(iso + 'T00:00:00');
      const dd = String(d.getDate()).padStart(2, '0');
      const mm = MONTHS_SHORT[d.getMonth()];
      const yy = String(d.getFullYear()).slice(2);
      return `${dd} ${mm} ${yy}`;
    }

    function deltaClass(val) {
      if (val > 0) return 'up';
      if (val < 0) return 'down';
      return 'neutral';
    }
    function deltaText(val) {
      if (val > 0) return `▲ +${val}`;
      if (val < 0) return `▼ ${val}`;
      return '…';
    }

    // Build an accessible aria-label for a reading row.
    function readingAriaLabel(r, delta) {
      const typeStr = r.type === 'baseline' ? 'Baseline reading' : 'Re-audit';
      const dateStr = fmtDate(r.date);
      const rankStr = (r.rank || '').charAt(0).toUpperCase() + (r.rank || '').slice(1);
      let deltaStr = '';
      if (delta !== null) {
        if (delta > 0) deltaStr = `, up ${delta}`;
        else if (delta < 0) deltaStr = `, down ${Math.abs(delta)}`;
        else deltaStr = ', no change';
      }
      return `${typeStr}, ${dateStr}, score ${r.auraScore}, ${rankStr}${deltaStr}. View reading.`;
    }

    // Build a single timeline row <li>.
    function buildTimelineRow(r, delta, isFirst) {
      const nodeClass = isFirst ? 'timeline-node current' : 'timeline-node';
      const dClass = delta !== null ? deltaClass(delta) : 'neutral';
      const dText  = delta !== null ? deltaText(delta) : '…';
      const label  = r.type === 'baseline' ? JOURNEY_COPY.rowBaseline : JOURNEY_COPY.rowReaudit;
      const href   = r.href || '#';
      return `<li class="timeline-item">
        <a href="${href}" class="timeline-link"
           aria-label="${escapeHtml(readingAriaLabel(r, delta))}"
           data-event="journey_reading_clicked"
           data-reading-id="${escapeHtml(r.id)}"
           data-reading-type="${escapeHtml(r.type)}">
          <span class="${nodeClass}" aria-hidden="true">◆</span>
          <div class="timeline-meta">
            <span class="timeline-label">${escapeHtml(label)}</span>
            <span class="timeline-date">${fmtDate(r.date)}</span>
          </div>
          <div class="timeline-score-row">
            <span>
              <span class="timeline-score">${r.auraScore}</span>
              <span class="timeline-rank">${escapeHtml((r.rank || '').toUpperCase())}</span>
            </span>
            <span class="timeline-right">
              <span class="timeline-delta ${dClass}" aria-hidden="true">${dText}</span>
              <span class="timeline-view">${JOURNEY_COPY.rowView}</span>
            </span>
          </div>
        </a>
      </li>`;
    }

    // Module 1 — Readings Timeline.
    function buildTimeline(readings) {
      // readings is oldest→newest from API; display newest first.
      const reversed = readings.slice().reverse();
      const SHOW_INITIAL = 4;
      const hasMore = reversed.length > SHOW_INITIAL;
      const visible = hasMore ? reversed.slice(0, SHOW_INITIAL) : reversed;

      // Compute deltas: for each entry in reversed, delta vs the next one in
      // reversed (i.e. the item that was *older* by one position).
      const deltas = reversed.map((r, i) => {
        if (i === reversed.length - 1) return null; // oldest reading — no delta
        return r.auraScore - reversed[i + 1].auraScore;
      });

      let rowsHtml = visible.map((r, i) => buildTimelineRow(r, deltas[i], i === 0)).join('');

      const countText = readings.length === 1
        ? JOURNEY_COPY.timelineSingular
        : JOURNEY_COPY.timelinePlural(readings.length);

      const showMoreBtn = hasMore
        ? `<button class="timeline-showmore" aria-expanded="false" id="journeyShowMore">${JOURNEY_COPY.showAll}</button>`
        : '';

      return `<article class="card" aria-labelledby="journey-timeline-heading">
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px">
          <span style="font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--muted)" id="journey-timeline-heading">${JOURNEY_COPY.timelineEyebrow}</span>
          <span style="font-size:12px;color:var(--muted)">${countText}</span>
        </div>
        <ol class="timeline-rail" style="padding:0;list-style:none;padding-left:24px" id="journeyTimelineList">
          ${rowsHtml}
        </ol>
        ${showMoreBtn}
      </article>`;
    }

    // Module 2 — Aura Score Over Time (inline SVG sparkline).
    function buildAuraSparkline(readings) {
      const W = 280; // logical SVG width; scales with 100% via viewBox
      const H = 120;
      const PAD_L = 8; const PAD_R = 30; const PAD_T = 18; const PAD_B = 28;

      const n = readings.length;
      // Min/max for Y scale (frame around min-20, max+10, but at least 0–100)
      const scores = readings.map((r) => r.auraScore);
      const rawMin = Math.min(...scores);
      const rawMax = Math.max(...scores);
      const yMin = Math.max(0, rawMin - 15);
      const yMax = Math.min(100, rawMax + 10);

      function xOf(i) {
        if (n === 1) return PAD_L + (W - PAD_L - PAD_R) / 2;
        return PAD_L + (i / (n - 1)) * (W - PAD_L - PAD_R);
      }
      function yOf(score) {
        if (yMax === yMin) return PAD_T + (H - PAD_T - PAD_B) / 2;
        return PAD_T + (1 - (score - yMin) / (yMax - yMin)) * (H - PAD_T - PAD_B);
      }

      // Aria label: compose from readings
      const ariaLabel = readings.map((r) => {
        const d = new Date(r.date + 'T00:00:00');
        return `${r.auraScore} in ${MONTHS_SHORT[d.getMonth()]}`;
      }).join(', ');

      // Gridlines at yMin and yMax
      const gridY1 = yOf(yMin + Math.round((yMax - yMin) * 0.25));
      const gridY2 = yOf(yMin + Math.round((yMax - yMin) * 0.75));

      let svgContent = '';
      // Gridlines
      svgContent += `<line x1="${PAD_L}" y1="${gridY1}" x2="${W - PAD_R + 10}" y2="${gridY1}" stroke="var(--line)" stroke-width="1" aria-hidden="true"/>`;
      svgContent += `<line x1="${PAD_L}" y1="${gridY2}" x2="${W - PAD_R + 10}" y2="${gridY2}" stroke="var(--line)" stroke-width="1" aria-hidden="true"/>`;

      if (n > 1) {
        // Polyline — no fill gradient (forbidden per spec)
        const pts = readings.map((r, i) => `${xOf(i).toFixed(1)},${yOf(r.auraScore).toFixed(1)}`).join(' ');
        svgContent += `<polyline points="${pts}" fill="none" stroke="var(--gold)" stroke-width="1.5" stroke-opacity="0.6" aria-hidden="true"/>`;
      }

      // Dots + labels
      readings.forEach((r, i) => {
        const cx = xOf(i).toFixed(1);
        const cy = yOf(r.auraScore).toFixed(1);
        const isLatest = (i === n - 1);
        const radius = isLatest ? 6 : 5;
        const fill   = isLatest ? 'var(--gold)' : 'var(--panel)';
        const stroke = 'var(--gold)';
        svgContent += `<circle cx="${cx}" cy="${cy}" r="${radius}" fill="${fill}" stroke="${stroke}" stroke-width="1.5" aria-hidden="true"/>`;
        if (isLatest) {
          // Score label above/beside latest dot
          const labelX = (parseFloat(cx) + 8).toFixed(1);
          const labelY = (parseFloat(cy) + 5).toFixed(1);
          svgContent += `<text x="${labelX}" y="${labelY}" fill="var(--mc-silver-bright,#e8e8e8)" font-family="JetBrains Mono,SF Mono,Menlo,monospace" font-size="12" aria-hidden="true">${r.auraScore}</text>`;
        }
      });

      // Date labels under each dot
      readings.forEach((r, i) => {
        const cx = xOf(i).toFixed(1);
        const labelY = (H - 4).toFixed(1);
        const d = new Date(r.date + 'T00:00:00');
        const monthLbl = MONTHS_SHORT[d.getMonth()];
        // For collisions at 360px with many points: show first/middle/last only when n>3
        const showLabel = (n <= 3) || (i === 0 || i === Math.floor((n - 1) / 2) || i === n - 1);
        if (showLabel) {
          svgContent += `<text x="${cx}" y="${labelY}" fill="var(--muted)" font-family="JetBrains Mono,SF Mono,Menlo,monospace" font-size="10" text-anchor="middle" aria-hidden="true">${monthLbl}</text>`;
        }
      });

      // Delta summary beneath SVG
      let summaryHtml = '';
      if (n === 1) {
        summaryHtml = `<p class="sparkline-caption">${JOURNEY_COPY.auraOnePoint}</p>`;
      } else {
        const net = readings[n - 1].auraScore - readings[0].auraScore;
        const sClass = net > 0 ? 'up' : (net < 0 ? 'down' : 'neutral');
        const sText = net > 0
          ? JOURNEY_COPY.auraSummaryUp(net)
          : (net < 0 ? JOURNEY_COPY.auraSummaryDown(net) : JOURNEY_COPY.auraSummaryFlat);
        summaryHtml = `<p class="sparkline-summary ${sClass}">${escapeHtml(sText)}</p>`;
      }

      return `<article class="card" aria-labelledby="journey-aura-heading">
        <div style="font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:14px" id="journey-aura-heading">${JOURNEY_COPY.auraTitle}</div>
        <svg class="sparkline-wrap" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none"
             role="img" aria-label="Aura score over ${n} reading${n !== 1 ? 's' : ''}: ${ariaLabel}.">
          ${svgContent}
        </svg>
        ${summaryHtml}
      </article>`;
    }

    // Module 3 — 8-Axis Before→After (paired horizontal bars).
    function buildAxes(axes) {
      // Use the axes keys that exist in both baseline and latest.
      const keys = Object.keys(axes.baseline).filter((k) => k in axes.latest);
      const rows = keys.map((k) => {
        const base = axes.baseline[k] || 0;
        const now  = axes.latest[k]   || 0;
        const delta = now - base;
        const label = AXIS_LABELS[k] || k;
        const dClass = deltaClass(delta);
        // Bar widths: base portion fills [0, base]%, gain is the delta on top.
        // For regression (now < base), no gain fill; bar is shorter.
        const baseW = Math.min(base, 100);
        const gainW = Math.max(0, Math.min(delta, 100 - baseW));
        const nowW  = Math.max(0, Math.min(now, 100));
        const isGain = delta >= 0;

        // Accessible axis row label (no color-only meaning).
        const accessibleDelta = delta > 0 ? `up ${delta}` : (delta < 0 ? `down ${Math.abs(delta)}` : 'no change');
        const rowAriaLabel = `${label}: ${base} baseline, ${now} now, ${accessibleDelta}.`;

        return `<div class="axis-journey" aria-label="${escapeHtml(rowAriaLabel)}">
          <div class="axis-journey-header">
            <span class="axis-journey-label">${escapeHtml(label)}</span>
            <span class="axis-journey-scores">
              <span>${base}</span>
              <span style="color:var(--muted)"> → </span>
              <span class="now-val">${now}</span>
            </span>
          </div>
          <div class="axis-journey-bar" role="presentation">
            ${isGain
              ? `<span class="base-fill" style="width:${baseW}%"></span><span class="gain-fill" style="left:${baseW}%;width:${gainW}%"></span>`
              : `<span class="now-fill" style="width:${nowW}%"></span>`
            }
          </div>
          <div class="axis-journey-delta ${dClass}" aria-hidden="true">${deltaText(delta)}</div>
        </div>`;
      });

      return `<article class="card" aria-labelledby="journey-axes-heading">
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:16px">
          <span style="font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--muted)" id="journey-axes-heading">${JOURNEY_COPY.axesTitle}</span>
          <span style="font-size:12px;color:var(--muted)">${JOURNEY_COPY.axesSubhead}</span>
        </div>
        ${rows.join('')}
      </article>`;
    }

    // Module 4 — Mirror Consistency (month heatmap).
    // State object lives here so chevrons can re-render.
    let _mirrorData = null;
    let _mirrorYear = 0;
    let _mirrorMonth = 0; // 0-indexed

    function buildMirrorHeatmap(mirrors, year, month) {
      const loggedSet = new Set(mirrors.loggedDates || []);
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      // Day of week of 1st (0=Sun)
      const firstDow = new Date(year, month, 1).getDay();
      const monthLabel = `${MONTHS_FULL[month]} ${year}`;

      // Logged count this month
      let monthLogged = 0;
      for (let d = 1; d <= daysInMonth; d++) {
        const iso = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
        if (loggedSet.has(iso)) monthLogged++;
      }

      // Accessible label
      const gridAriaLabel = `Mirror logged on ${monthLogged} of ${daysInMonth} days in ${MONTHS_FULL[month]}.`;

      // Determine navigation bounds
      const firstDate = mirrors.firstDate ? new Date(mirrors.firstDate + 'T00:00:00') : null;
      const firstYear  = firstDate ? firstDate.getFullYear() : year;
      const firstMonth = firstDate ? firstDate.getMonth() : month;
      const now = new Date();
      const canPrev = firstDate ? (year > firstYear || (year === firstYear && month > firstMonth)) : false;
      const canNext = (year < now.getFullYear() || (year === now.getFullYear() && month < now.getMonth()));

      // DOW header
      const dowLabels = ['S','M','T','W','T','F','S'];
      const dowHtml = dowLabels.map((l) => `<span>${l}</span>`).join('');

      // Blank cells before day 1
      let cellsHtml = '';
      for (let i = 0; i < firstDow; i++) {
        cellsHtml += `<div class="heatmap-dot empty" aria-hidden="true"></div>`;
      }
      for (let d = 1; d <= daysInMonth; d++) {
        const iso = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
        const on = loggedSet.has(iso);
        cellsHtml += `<div class="heatmap-dot${on ? ' on' : ''}" aria-hidden="true"></div>`;
      }

      // Streak line — only show if longestStreak >= 2
      const streakHtml = (mirrors.longestStreak || 0) >= 2
        ? `<p class="mirror-streak-line">${JOURNEY_COPY.mirrorStreak(mirrors.longestStreak)}</p>`
        : '';

      // Zero-state caption
      const countNum = mirrors.totalCount || 0;
      const countCaption = countNum === 0
        ? `<span class="mirror-count-label">${JOURNEY_COPY.mirrorZeroCaption}</span>`
        : `<span class="mirror-count-label">${JOURNEY_COPY.mirrorCountLabel}</span>`;

      return `<article class="card" aria-labelledby="journey-mirror-heading" id="journeyMirrorCard">
        <div style="font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:16px" id="journey-mirror-heading">${JOURNEY_COPY.mirrorTitle}</div>
        <span class="mirror-count-big">${countNum}</span>
        ${countCaption}
        <div class="heatmap-month-nav" role="group" aria-label="Navigate months">
          <button class="heatmap-chevron"
            aria-label="Previous month"
            id="journeyMirrorPrev"
            ${canPrev ? '' : 'disabled'}>‹</button>
          <span class="heatmap-month-label">${monthLabel}</span>
          <button class="heatmap-chevron"
            aria-label="Next month"
            id="journeyMirrorNext"
            ${canNext ? '' : 'disabled'}>›</button>
        </div>
        <div class="heatmap-dow" aria-hidden="true">${dowHtml}</div>
        <div class="heatmap-grid" role="img" aria-label="${escapeHtml(gridAriaLabel)}">${cellsHtml}</div>
        ${streakHtml}
      </article>`;
    }

    function attachMirrorChevrons(mirrors) {
      const prevBtn = document.getElementById('journeyMirrorPrev');
      const nextBtn = document.getElementById('journeyMirrorNext');
      if (!prevBtn || !nextBtn) return;
      prevBtn.addEventListener('click', function () {
        _mirrorMonth--;
        if (_mirrorMonth < 0) { _mirrorMonth = 11; _mirrorYear--; }
        const card = document.getElementById('journeyMirrorCard');
        if (card) card.outerHTML = buildMirrorHeatmap(mirrors, _mirrorYear, _mirrorMonth);
        // Re-attach after DOM replacement
        attachMirrorChevrons(mirrors);
      });
      nextBtn.addEventListener('click', function () {
        _mirrorMonth++;
        if (_mirrorMonth > 11) { _mirrorMonth = 0; _mirrorYear++; }
        const card = document.getElementById('journeyMirrorCard');
        if (card) card.outerHTML = buildMirrorHeatmap(mirrors, _mirrorYear, _mirrorMonth);
        attachMirrorChevrons(mirrors);
      });
    }

    // Module 5 — Hair Trend (score + Norwood + mini sparkline).
    function buildHairTrend(hair) {
      const current = hair.current;
      const history = hair.history || [];

      // Trend pill — based on score direction. Neutral framing only (COPY APPROVED 2026-06-02).
      let trendPill = '';
      if (history.length >= 2) {
        const first = history[0].hairlineScore;
        const last  = history[history.length - 1].hairlineScore;
        const diff  = last - first;
        let pillText = JOURNEY_COPY.hairTitle; // fallback
        if (diff > 2)       pillText = 'improving';
        else if (diff < -2) pillText = 'receding';
        else                pillText = 'stable';
        trendPill = `<span class="badge">${pillText}</span>`;
      }

      // Norwood stage summary
      let stageSummary = '';
      if (history.length >= 2) {
        const stage = current.norwoodStage || '';
        const stageCount = history.filter((h) => h.norwoodStage === stage).length;
        stageSummary = `<p class="hair-stage-caption">${JOURNEY_COPY.hairStageHeld(stage, stageCount)}</p>`;
      } else {
        stageSummary = `<p class="hair-stage-caption">${JOURNEY_COPY.hairOneReading}</p>`;
      }

      // Mini sparkline (identical spec to Module 2 but 80px tall)
      let sparkHtml = '';
      if (history.length >= 2) {
        const W = 280; const H = 80;
        const PAD_L = 8; const PAD_R = 20; const PAD_T = 12; const PAD_B = 20;
        const n = history.length;
        const hairScores = history.map((h) => h.hairlineScore);
        const hMin = Math.max(0, Math.min(...hairScores) - 10);
        const hMax = Math.min(100, Math.max(...hairScores) + 10);
        function hX(i) {
          if (n === 1) return PAD_L + (W - PAD_L - PAD_R) / 2;
          return PAD_L + (i / (n - 1)) * (W - PAD_L - PAD_R);
        }
        function hY(score) {
          if (hMax === hMin) return PAD_T + (H - PAD_T - PAD_B) / 2;
          return PAD_T + (1 - (score - hMin) / (hMax - hMin)) * (H - PAD_T - PAD_B);
        }
        const pts = history.map((h, i) => `${hX(i).toFixed(1)},${hY(h.hairlineScore).toFixed(1)}`).join(' ');
        const hairAriaLabel = `Hairline score over ${n} readings: ${history.map((h) => h.hairlineScore).join(', ')}.`;
        let hairSvg = `<polyline points="${pts}" fill="none" stroke="var(--gold)" stroke-width="1.5" stroke-opacity="0.6" aria-hidden="true"/>`;
        history.forEach((h, i) => {
          const cx = hX(i).toFixed(1);
          const cy = hY(h.hairlineScore).toFixed(1);
          const isLatest = (i === n - 1);
          const r = isLatest ? 5 : 4;
          const fill = isLatest ? 'var(--gold)' : 'var(--panel)';
          hairSvg += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${fill}" stroke="var(--gold)" stroke-width="1.5" aria-hidden="true"/>`;
        });
        sparkHtml = `<svg class="sparkline-wrap" style="height:80px" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" role="img" aria-label="${escapeHtml(hairAriaLabel)}">${hairSvg}</svg>`;
      }

      return `<article class="card" aria-labelledby="journey-hair-heading">
        <div style="font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:14px" id="journey-hair-heading">${JOURNEY_COPY.hairTitle}</div>
        <div class="hair-top-row">
          <span class="hair-score-big">${current.hairlineScore}</span>
          <span class="hair-norwood">Norwood ${escapeHtml(current.norwoodStage || '')}</span>
          ${trendPill}
        </div>
        ${sparkHtml}
        ${stageSummary}
      </article>`;
    }

    // Section-level "first chapter" card — shown when almost no data.
    function buildFirstChapterCard(readings) {
      const baseline = readings[0];
      // Days until next reading: 30 days from baseline date.
      const baseDate = new Date(baseline.date + 'T00:00:00');
      const now = new Date();
      const daysSince = Math.floor((now - baseDate) / 86400000);
      const daysUntil = Math.max(0, 30 - daysSince);
      const nextLine = daysUntil > 0
        ? JOURNEY_COPY.firstChapterNext(daysUntil)
        : JOURNEY_COPY.firstChapterDefault;

      const href = baseline.href || '#';
      return `<div class="card card--gold">
        <div style="font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:12px">${JOURNEY_COPY.sectionEyebrow}</div>
        <p style="font-family:'Cormorant Garamond',serif;font-style:italic;font-size:16px;color:var(--ink);margin-bottom:20px">${JOURNEY_COPY.firstChapterQuote}</p>
        <a href="${href}" class="timeline-link"
           aria-label="${escapeHtml(readingAriaLabel(baseline, null))}"
           data-event="journey_reading_clicked"
           data-reading-id="${escapeHtml(baseline.id)}"
           data-reading-type="${escapeHtml(baseline.type)}"
           style="padding:12px 0;display:block">
          <div class="timeline-meta">
            <span class="timeline-label">${JOURNEY_COPY.rowBaseline}</span>
            <span class="timeline-date">${fmtDate(baseline.date)}</span>
          </div>
          <div class="timeline-score-row">
            <span>
              <span class="timeline-score">${baseline.auraScore}</span>
              <span class="timeline-rank">${escapeHtml((baseline.rank || '').toUpperCase())}</span>
            </span>
            <span class="timeline-view">${JOURNEY_COPY.rowView}</span>
          </div>
        </a>
        <p style="font-size:13px;color:var(--muted);margin-top:16px">${escapeHtml(nextLine)}</p>
      </div>`;
    }

    // Main render function — fetches and builds the entire Journey section.
    async function renderJourney() {
      const section = document.getElementById('journey-section');
      if (!section) return;

      const token = LM.getToken();
      if (!token) return;

      // Show skeleton while loading
      section.innerHTML = `<div class="journey-skeleton" aria-hidden="true"></div>`;

      let data;
      try {
        const res = await fetch('/api/lookmax/me/history', {
          headers: { 'Authorization': 'Bearer ' + token },
        });
        if (!res.ok) {
          section.innerHTML = `<p style="font-size:13px;color:var(--muted);text-align:center;margin-top:8px">${JOURNEY_COPY.errorRetry}</p>`;
          return;
        }
        data = await res.json();
      } catch (e) {
        section.innerHTML = '';
        return;
      }

      const { readings, axes, mirrors, hair } = data;

      // Guard: if readings is missing or empty, section stays empty.
      if (!readings || readings.length === 0) {
        section.innerHTML = '';
        return;
      }

      // Section-level first-chapter state.
      const isFirstChapter = (
        readings.length <= 1 &&
        (mirrors.totalCount === 0) &&
        axes === null &&
        hair === null
      );

      // Build section HTML.
      let html = `<section aria-labelledby="journey-heading">
        <div class="journey-header">
          <p class="journey-eyebrow">${JOURNEY_COPY.sectionEyebrow}</p>
          <h2 class="journey-subhead" id="journey-heading">${JOURNEY_COPY.sectionSubhead}</h2>
        </div>`;

      if (isFirstChapter) {
        html += buildFirstChapterCard(readings);
      } else {
        // Module 1 — always present when readings.length >= 1
        html += buildTimeline(readings);

        // Module 2 — always present when readings.length >= 1
        html += buildAuraSparkline(readings);

        // Module 3 — only when axes exists (requires a re-audit)
        if (axes && axes.baseline && axes.latest) {
          html += buildAxes(axes);
        }

        // Module 4 — always present (mirrors always in response)
        if (mirrors) {
          const now = new Date();
          _mirrorData  = mirrors;
          _mirrorYear  = now.getFullYear();
          _mirrorMonth = now.getMonth();
          html += buildMirrorHeatmap(mirrors, _mirrorYear, _mirrorMonth);
        }

        // Module 5 — only when hair data exists
        if (hair && hair.current) {
          html += buildHairTrend(hair);
        }
      }

      html += `</section>`;
      section.innerHTML = html;

      // Animate axis bars after DOM insertion (transition from 0 to final width)
      // The CSS transition handles the animation; we just need to defer the width set
      // slightly so the browser paints the 0-width state first.
      requestAnimationFrame(function () {
        section.querySelectorAll('.axis-journey-bar .base-fill, .axis-journey-bar .gain-fill, .axis-journey-bar .now-fill').forEach(function (el) {
          // Width is already set inline; the CSS transition will animate from 0.
          // Re-apply to trigger the transition (the element was at width:0 at insertion time).
          const w = el.style.width;
          el.style.width = '0';
          requestAnimationFrame(function () { el.style.width = w; });
        });
      });

      // Attach mirror month-navigation chevrons (if mirror module is present)
      if (mirrors && !isFirstChapter) {
        attachMirrorChevrons(mirrors);
      }

      // Attach "Show all readings" toggle
      const showMoreBtn = document.getElementById('journeyShowMore');
      if (showMoreBtn) {
        showMoreBtn.addEventListener('click', function () {
          const list = document.getElementById('journeyTimelineList');
          if (!list) return;
          const expanded = showMoreBtn.getAttribute('aria-expanded') === 'true';
          if (!expanded) {
            // Render all rows
            const reversed = readings.slice().reverse();
            const deltas = reversed.map((r, i) => {
              if (i === reversed.length - 1) return null;
              return r.auraScore - reversed[i + 1].auraScore;
            });
            list.innerHTML = reversed.map((r, i) => buildTimelineRow(r, deltas[i], i === 0)).join('');
            showMoreBtn.setAttribute('aria-expanded', 'true');
            showMoreBtn.style.display = 'none';
          }
        });
      }

      // Attach reading-click tracking
      section.querySelectorAll('[data-event="journey_reading_clicked"]').forEach(function (el) {
        el.addEventListener('click', function () {
          if (window.mc) {
            window.mc.track('journey_reading_clicked', {
              readingId:   el.getAttribute('data-reading-id'),
              type:        el.getAttribute('data-reading-type'),
            });
          }
        });
      });

      // Fire section-viewed analytics event (once per render)
      if (window.mc) {
        window.mc.track('journey_section_viewed', {});
      }
    }
  </script>
  <script>
    // Sign out: clear the local session (stateless JWT — no server call needed)
    // and return to the public entry. Clears all lookmax.* keys for a clean slate.
    (function () {
      var btn = document.getElementById('signOutBtn');
      if (!btn) return;
      btn.addEventListener('click', function () {
        try {
          ['lookmax.token', 'lookmax.auditId', 'lookmax.push_dismissed'].forEach(function (k) {
            localStorage.removeItem(k);
          });
        } catch (e) { /* ignore storage errors */ }
        window.location.href = '/lookmaxing';
      });
    })();
  </script>
</body>
</html>
