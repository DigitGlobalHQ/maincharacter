// ═══════════════════════════════════════════
// TOAST SYSTEM
// ═══════════════════════════════════════════
function ToastContainer({ toasts, onDismiss }) {
  return (
    <div style={{ position:'fixed', bottom:24, right:24, zIndex:9999, display:'flex', flexDirection:'column', gap:8 }}>
      {toasts.map(t => (
        <div key={t.id} style={{
          background: T.surface, border:`1px solid ${T.gold}40`, borderRadius:T.radius,
          padding:'12px 20px', color:T.ink, fontSize:13, fontWeight:500,
          boxShadow:`0 8px 32px rgba(0,0,0,0.4), 0 0 20px ${T.goldGlow}`,
          animation: t.leaving ? 'toastOut 0.3s ease forwards' : 'toastIn 0.4s cubic-bezier(0.16,1,0.3,1)',
          display:'flex', alignItems:'center', gap:10, minWidth:240,
        }}>
          <span style={{ color:T.gold, fontSize:16 }}>◆</span>
          {t.message}
        </div>
      ))}
    </div>
  );
}

// ═══════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════
function Modal({ open, onClose, title, children, width }) {
  if (!open) return null;
  return (
    <div onClick={onClose} style={{
      position:'fixed', inset:0, background:'rgba(0,0,0,0.7)', backdropFilter:'blur(8px)',
      zIndex:8000, display:'flex', alignItems:'center', justifyContent:'center',
      animation:'fadeIn 0.2s ease',
    }}>
      <div onClick={e => e.stopPropagation()} style={{
        background:T.char, border:`1px solid ${T.border}`, borderRadius:T.radiusLg,
        width: width || 520, maxWidth:'90vw', maxHeight:'80vh', overflow:'auto',
        boxShadow:'0 24px 80px rgba(0,0,0,0.6)',
      }}>
        <div style={{ padding:'20px 24px', borderBottom:`1px solid ${T.border}`, display:'flex', justifyContent:'space-between', alignItems:'center' }}>
          <span style={{ fontSize:16, fontWeight:600, color:T.ink }}>{title}</span>
          <button onClick={onClose} style={{ background:'none', border:'none', color:T.inkDim, cursor:'pointer', fontSize:18, padding:4 }}>✕</button>
        </div>
        <div style={{ padding:24 }}>{children}</div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════
// METRIC CARD
// ═══════════════════════════════════════════
function MetricCard({ label, value, color, icon }) {
  return (
    <div style={{
      background:T.char, border:`1px solid ${T.border}`, borderRadius:T.radiusLg,
      padding:'20px 24px', flex:1, minWidth:160,
      transition:T.transition,
    }}>
      <div style={{ fontSize:11, fontWeight:600, letterSpacing:'0.08em', textTransform:'uppercase', color:T.inkDim, marginBottom:8 }}>
        {icon && <span style={{ marginRight:6 }}>{icon}</span>}{label}
      </div>
      <div style={{ fontSize:32, fontWeight:700, color, letterSpacing:'-0.02em' }}>{value}</div>
    </div>
  );
}

// ═══════════════════════════════════════════
// PILLAR PILL
// ═══════════════════════════════════════════
function PillarPill({ pillar, small }) {
  const c = pillarColor(pillar);
  return (
    <span style={{
      background: `${c}18`, color: c, border: `1px solid ${c}30`,
      padding: small ? '2px 8px' : '3px 10px',
      borderRadius: 20, fontSize: small ? 10 : 11,
      fontWeight: 600, letterSpacing: '0.04em', textTransform: 'uppercase',
      whiteSpace: 'nowrap',
    }}>
      {pillarLabel(pillar)}
    </span>
  );
}

// ═══════════════════════════════════════════
// STATUS BADGE
// ═══════════════════════════════════════════
function StatusBadge({ tier }) {
  const colors = { trial: { bg: `${T.inkFaint}20`, c: T.inkDim, label:'Trial' }, pro: { bg: `${T.gold}18`, c: T.gold, label:'Pro' }, annual: { bg: `${T.gold}25`, c: T.goldBright, label:'Annual' } };
  const s = colors[tier] || colors.trial;
  return (
    <span style={{
      background: s.bg, color: s.c, padding:'3px 10px', borderRadius:20,
      fontSize:11, fontWeight:600, letterSpacing:'0.04em',
    }}>{s.label}</span>
  );
}

// ═══════════════════════════════════════════
// CSS BAR CHART (no library)
// ═══════════════════════════════════════════
function BarChart({ data, max, color, label, height }) {
  const h = height || 120;
  const mx = max || Math.max(...data, 1);
  return (
    <div>
      {label && <div style={{ fontSize:11, color:T.inkDim, marginBottom:8, fontWeight:600, letterSpacing:'0.06em', textTransform:'uppercase' }}>{label}</div>}
      <div style={{ display:'flex', alignItems:'flex-end', gap:4, height:h }}>
        {data.map((v, i) => (
          <div key={i} style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'flex-end', height:'100%' }}>
            <div style={{
              width:'100%', background:color || T.gold, borderRadius:'4px 4px 0 0',
              height:`${(v / mx) * 100}%`, minHeight:2, opacity: 0.8 + (i / data.length) * 0.2,
              animation:`barGrow 0.6s cubic-bezier(0.16,1,0.3,1) ${i * 0.05}s both`,
            }}/>
            <div style={{ fontSize:9, color:T.inkFaint, marginTop:4 }}>{v}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function LineChart({ datasets, labels, height }) {
  const h = height || 140;
  const allVals = datasets.flatMap(d => d.data);
  const max = Math.max(...allVals, 1);
  const min = Math.min(...allVals, 0);
  const range = max - min || 1;

  return (
    <div>
      <div style={{ display:'flex', gap:16, marginBottom:8 }}>
        {datasets.map((ds, i) => (
          <div key={i} style={{ display:'flex', alignItems:'center', gap:6, fontSize:11, color:T.inkDim }}>
            <div style={{ width:12, height:3, background:ds.color, borderRadius:2 }}/>
            {ds.label}
          </div>
        ))}
      </div>
      <div style={{ position:'relative', height:h, borderLeft:`1px solid ${T.border}`, borderBottom:`1px solid ${T.border}` }}>
        {datasets.map((ds, di) => (
          <svg key={di} style={{ position:'absolute', inset:0, width:'100%', height:'100%' }} viewBox={`0 0 ${(ds.data.length - 1) * 100} ${h}`} preserveAspectRatio="none">
            <polyline
              fill="none"
              stroke={ds.color}
              strokeWidth="2.5"
              strokeLinecap="round"
              strokeLinejoin="round"
              points={ds.data.map((v, i) => `${i * 100},${h - ((v - min) / range) * (h - 16) - 8}`).join(' ')}
            />
            {ds.data.map((v, i) => (
              <circle key={i} cx={i * 100} cy={h - ((v - min) / range) * (h - 16) - 8} r="4" fill={ds.color} />
            ))}
          </svg>
        ))}
        {labels && (
          <div style={{ position:'absolute', bottom:-18, left:0, right:0, display:'flex', justifyContent:'space-between' }}>
            {labels.map((l, i) => <span key={i} style={{ fontSize:9, color:T.inkFaint }}>{l}</span>)}
          </div>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════
// USERS TAB
// ═══════════════════════════════════════════
function UsersTab({ onViewUser, toast }) {
  const [filter, setFilter] = useState('all');

  const filtered = users.filter(u => {
    if (filter === 'all') return true;
    if (filter === 'orator' || filter === 'aesthetic' || filter === 'sage') return u.pillar === filter;
    if (filter === 'paid') return u.paid;
    if (filter === 'trial') return !u.paid;
    if (filter === 'atrisk') return u.streak < 3;
    return true;
  });

  const totalUsers = users.length;
  const activeToday = users.filter(u => u.lastActive === 'today').length;
  const paid = users.filter(u => u.paid).length;
  const trialEnding = users.filter(u => u.dayInTrial >= 6 && !u.paid).length;

  const filters = [
    { key:'all', label:'All' }, { key:'orator', label:'Orator' },
    { key:'aesthetic', label:'Aesthetic' }, { key:'sage', label:'Sage' },
    { key:'paid', label:'Paid' }, { key:'trial', label:'Trial' }, { key:'atrisk', label:'At Risk' },
  ];

  const [nudgeModal, setNudgeModal] = useState(null);
  const [nudgeText, setNudgeText] = useState('');
  const [promoteModal, setPromoteModal] = useState(null);
  const [payModal, setPayModal] = useState(null);

  const isAtRisk = (u) => u.lastActive !== 'today' && u.lastActive !== 'yesterday' && !u.paid;
  const isDay7 = (u) => u.dayInTrial >= 7 && !u.paid;

  const getRowBorder = (u) => {
    if (u.paid) return `3px solid ${T.gold}40`;
    if (isDay7(u)) return `3px solid ${T.aesthetic}60`;
    if (isAtRisk(u)) return `3px solid ${T.red}40`;
    return `3px solid transparent`;
  };

  return (
    <div style={{ animation:'fadeIn 0.3s ease' }}>
      {/* Metric Cards */}
      <div style={{ display:'flex', gap:16, marginBottom:28 }}>
        <MetricCard label="Total Users" value={totalUsers} color={T.gold} icon="◆" />
        <MetricCard label="Active Today" value={activeToday} color={T.sage} icon="●" />
        <MetricCard label="Paid" value={paid} color={T.orator} icon="★" />
        <MetricCard label="Trial Ending" value={trialEnding} color={T.aesthetic} icon="⏳" />
      </div>

      {/* Filter Pills */}
      <div style={{ display:'flex', gap:8, marginBottom:20, flexWrap:'wrap' }}>
        {filters.map(f => (
          <button key={f.key} onClick={() => setFilter(f.key)} style={{
            background: filter === f.key ? `${T.gold}20` : T.surface,
            border: `1px solid ${filter === f.key ? T.gold + '50' : T.border}`,
            color: filter === f.key ? T.gold : T.inkDim,
            padding:'6px 16px', borderRadius:20, fontSize:12, fontWeight:500,
            cursor:'pointer', transition:T.transition, letterSpacing:'0.02em',
          }}>
            {f.label}
            {f.key !== 'all' && <span style={{ marginLeft:6, opacity:0.6 }}>
              {f.key === 'atrisk' ? users.filter(u => u.streak < 3).length : users.filter(u => f.key === 'paid' ? u.paid : f.key === 'trial' ? !u.paid : u.pillar === f.key).length}
            </span>}
          </button>
        ))}
      </div>

      {/* Table */}
      <div style={{ background:T.char, border:`1px solid ${T.border}`, borderRadius:T.radiusLg, overflow:'hidden' }}>
        {/* Header */}
        <div style={{
          display:'grid', gridTemplateColumns:'2fr 100px 60px 80px 90px 100px 1fr',
          padding:'12px 20px', borderBottom:`1px solid ${T.border}`,
          fontSize:10, fontWeight:700, letterSpacing:'0.1em', textTransform:'uppercase', color:T.inkFaint,
        }}>
          <span>Name</span><span>Pillar</span><span>Day</span><span>Streak</span>
          <span>Status</span><span>Last Active</span><span style={{ textAlign:'right' }}>Actions</span>
        </div>

        {/* Rows */}
        {filtered.map((u, i) => (
          <div key={u.id} style={{
            display:'grid', gridTemplateColumns:'2fr 100px 60px 80px 90px 100px 1fr',
            padding:'14px 20px', borderBottom:`1px solid ${T.border}`,
            borderLeft: getRowBorder(u),
            alignItems:'center', fontSize:13,
            transition:T.transition, animation:`fadeIn 0.3s ease ${i * 0.03}s both`,
            background: isAtRisk(u) ? T.redGlow : 'transparent',
          }}
          onMouseEnter={e => e.currentTarget.style.background = isAtRisk(u) ? 'rgba(231,76,60,0.08)' : T.surface}
          onMouseLeave={e => e.currentTarget.style.background = isAtRisk(u) ? T.redGlow : 'transparent'}
          >
            <div>
              <div style={{ fontWeight:600, color:T.ink }}>{u.name}</div>
              <div style={{ fontSize:11, color:T.inkFaint, marginTop:2 }}>{u.rankName}</div>
            </div>
            <div><PillarPill pillar={u.pillar} /></div>
            <div style={{ fontWeight:600, color:T.ink }}>D{u.dayInTrial}</div>
            <div style={{ display:'flex', alignItems:'center', gap:4 }}>

              <span style={{ fontWeight:600, color: u.streak >= 5 ? T.orator : u.streak >= 3 ? T.ink : T.red }}>{u.streak}</span>
            </div>
            <div><StatusBadge tier={u.tier} /></div>
            <div style={{ fontSize:12, color: u.lastActive === 'today' ? T.sage : u.lastActive === 'yesterday' ? T.inkDim : T.red }}>
              {u.lastActive}
            </div>
            <div style={{ display:'flex', gap:6, justifyContent:'flex-end', flexWrap:'wrap' }}>
              <ActionBtn label="View" onClick={() => onViewUser(u)} />
              <ActionBtn label="Nudge" color={T.sage} onClick={() => { setNudgeModal(u); setNudgeText(`Good morning ${u.name.split(' ')[0]}. The Consultant is ready. Five minutes is enough.`); }} />
              <ActionBtn label="Promote" color={T.aesthetic} onClick={() => setPromoteModal(u)} />

      {/* Nudge Modal */}

          width:'100%', height:120, background:T.surface, border:`1px solid ${T.border}`,

          fontFamily:'inherit', lineHeight:1.6,

        <div style={{ marginTop:16, display:'flex', gap:10, justifyContent:'flex-end' }}>
          <button onClick={() => setNudgeModal(null)} style={cancelBtnStyle}>Cancel</button>
          <button onClick={() => { toast(`Nudge sent to ${nudgeModal.name.split(' ')[0]}`); setNudgeModal(null); }} style={primaryBtnStyle}>
            Send via WhatsApp

        </div>
      </Modal>

      {/* Promote Modal */}
      <Modal open={!!promoteModal} onClose={() => setPromoteModal(null)} title={`Promote — ${promoteModal?.name}`} width={580}>
        {promoteModal && (
          <div>
            <div style={{ fontSize:12, color:T.inkDim, marginBottom:8 }}>Current Rank: <span style={{ color:T.ink }}>{promoteModal.rankName}</span></div>
            <div style={{ fontSize:12, color:T.inkDim, marginBottom:16 }}>Promote to:</div>
            <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
              {Object.entries(rankCeremony).filter(([k]) => Number(k) > promoteModal.rank).map(([k, v]) => (

                  background:T.surface, border:`1px solid ${T.border}`, borderRadius:T.radius,
                  padding:16, cursor:'pointer', transition:T.transition,

                onMouseEnter={e => e.currentTarget.style.borderColor = T.gold + '50'}
                onMouseLeave={e => e.currentTarget.style.borderColor = T.border}
                >
                  <div style={{ fontWeight:600, color:T.gold, marginBottom:8, fontSize:14 }}>Rank {k} — {v.name}</div>

        </div>

        {/* Pillar Breakdown */}
        <div style={{ background:T.char, border:`1px solid ${T.border}`, borderRadius:T.radiusLg, padding:24 }}>
          <SectionLabel>Pillar Breakdown</SectionLabel>
          <div style={{ display:'flex', justifyContent:'center', marginTop:8, marginBottom:20 }}>
            {/* CSS Pie chart using conic-gradient */}
            <div style={{
              width:140, height:140, borderRadius:'50%',
              background:`conic-gradient(${T.orator} 0% 50%, ${T.aesthetic} 50% 75%, ${T.sage} 75% 100%)`,
              position:'relative',
            }}>
              <div style={{
                position:'absolute', inset:20, borderRadius:'50%', background:T.char,
                display:'flex', alignItems:'center', justifyContent:'center',
                fontSize:12, fontWeight:600, color:T.inkDim, flexDirection:'column',
              }}>
                <div style={{ fontSize:20, fontWeight:700, color:T.ink }}>{users.length}</div>
                <div>users</div>
              </div>
            </div>
          </div>
          <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
            {pillarBreakdown.map(p => (
              <div key={p.label} style={{ display:'flex', alignItems:'center', gap:10 }}>
                <div style={{ width:10, height:10, borderRadius:2, background:p.color }}/>
                <span style={{ fontSize:12, color:T.ink, flex:1 }}>{p.label}</span>
                <span style={{ fontSize:12, fontWeight:600, color:p.color }}>{p.value}</span>
                <span style={{ fontSize:11, color:T.inkFaint, width:36, textAlign:'right' }}>{p.pct}%</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════
// SHARED BUTTON STYLES
// ═══════════════════════════════════════════
const primaryBtnStyle = {
  background:`${T.gold}20`, border:`1px solid ${T.gold}50`, color:T.gold,
  padding:'8px 20px', borderRadius:T.radius, fontSize:13, fontWeight:600,
  cursor:'pointer', transition:T.transition, letterSpacing:'0.02em',
};

const cancelBtnStyle = {
  background:'transparent', border:`1px solid ${T.border}`, color:T.inkDim,
  padding:'8px 20px', borderRadius:T.radius, fontSize:13, fontWeight:500,
  cursor:'pointer', transition:T.transition,
};

// ═══════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════
function App() {
  const [tab, setTab] = useState('users');
  const [selectedUser, setSelectedUser] = useState(null);
  const [toasts, setToasts] = useState([]);
  const toastIdRef = useRef(0);

  const toast = useCallback((message) => {
    const id = ++toastIdRef.current;
    setToasts(prev => [...prev, { id, message }]);
    setTimeout(() => {
      setToasts(prev => prev.map(t => t.id === id ? { ...t, leaving: true } : t));
      setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 300);
    }, 2000);
  }, []);

  const tabs = [
    { key:'users', label:'Users', icon:'◆' },
    { key:'broadcast', label:'Broadcast', icon:'◇' },
    { key:'analytics', label:'Analytics', icon:'▪' },
  ];

  return (
    <div style={{ minHeight:'100vh', background:T.obsidian }}>
      {/* Top Nav */}
      <nav style={{
        position:'fixed', top:0, left:0, right:0, zIndex:6000, height:56,
        background:'rgba(7,7,8,0.85)', backdropFilter:'blur(20px)',
        borderBottom:`1px solid ${T.border}`,
        display:'flex', alignItems:'center', justifyContent:'space-between',
        padding:'0 28px',
      }}>
        <div style={{ display:'flex', alignItems:'center', gap:10 }}>
          <span style={{ color:T.gold, fontSize:14 }}>◆</span>
          <span style={{ fontWeight:700, fontSize:14, letterSpacing:'0.12em', color:T.ink }}>MAINCHARACTER</span>
          <span style={{
            fontSize:9, fontWeight:700, letterSpacing:'0.1em', color:T.obsidian,
            background:T.gold, padding:'2px 8px', borderRadius:10, marginLeft:4,
          }}>ADMIN</span>
        </div>

        <div style={{ display:'flex', gap:4 }}>
          {tabs.map(t => (
            <button key={t.key} onClick={() => { setTab(t.key); setSelectedUser(null); }} style={{
              background: tab === t.key ? `${T.gold}15` : 'transparent',
              border: `1px solid ${tab === t.key ? T.gold + '30' : 'transparent'}`,
              color: tab === t.key ? T.gold : T.inkDim,
              padding:'7px 18px', borderRadius:T.radius, fontSize:12, fontWeight:500,
              cursor:'pointer', transition:T.transition, display:'flex', alignItems:'center', gap:6,
              letterSpacing:'0.03em',
            }}>
              <span style={{ fontSize:8 }}>{t.icon}</span> {t.label}
            </button>
          ))}
        </div>

        <div style={{ fontSize:11, color:T.inkFaint, display:'flex', alignItems:'center', gap:8 }}>
          <div style={{ width:6, height:6, borderRadius:'50%', background:'#4ade80', animation:'pulse 2s infinite' }}/>
          Live · {users.filter(u => u.lastActive === 'today').length} active
        </div>
      </nav>

      {/* Main Content */}
      <main style={{ paddingTop:80, paddingBottom:40, paddingLeft:28, paddingRight: selectedUser ? 548 : 28, transition:'padding 0.4s cubic-bezier(0.16,1,0.3,1)' }}>
        {tab === 'users' && <UsersTab onViewUser={setSelectedUser} toast={toast} />}
        {tab === 'broadcast' && <BroadcastTab toast={toast} />}
        {tab === 'analytics' && <AnalyticsTab />}
      </main>

      {/* User Profile Slide-in */}
      {selectedUser && (
        <>
          <div onClick={() => setSelectedUser(null)} style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.3)', zIndex:6500 }}/>
          <UserProfile user={selectedUser} onClose={() => setSelectedUser(null)} toast={toast} />
        </>
      )}

      {/* Toasts */}
      <ToastContainer toasts={toasts} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
