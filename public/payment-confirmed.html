<!doctype html>
<!-- Post-payment confirmation (P6 + Login Gate P0-1 → design-spec refactor).
     Consultant voice; ◆ only, no exclamation marks.
     Auto-polls /api/payment/status for 30s (F1 mitigation).
     When firstLoginToken is present, exchanges it silently via
     /api/lookmax/auth/exchange-first-login and stores the JWT.
     Design-spec changes: ◆ breath in waiting state, Mirror CTA as standalone block,
     receipt collapsed to single line, opacity fade on confirmed reveal. -->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MainCharacter — The Chamber is Open</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Sora:wght@200;300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root { --obsidian:#070708; --panel:#0d0d0f; --line:#1d1d20; --gold:#e8b84b; --ink:#f4f1ea; --muted:#8a877f; --ink-dim:#c2bfb6; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--obsidian); color: var(--ink);
      font-family: 'Sora', system-ui, sans-serif; font-weight: 300; line-height: 1.6;
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px;
      background-image: radial-gradient(circle at 50% 0%, rgba(232,184,75,0.08), transparent 55%);
    }
    .card { max-width: 600px; width: 100%; text-align: center; }
    .eyebrow { color: var(--gold); letter-spacing: 4px; font-size: 11px; text-transform: uppercase; margin-bottom: 6px; }
    h1 { font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 500; font-size: clamp(32px, 6vw, 50px); line-height: 1.12; margin: 16px 0 10px; }
    .lede { color: var(--muted); font-size: 16px; margin-bottom: 32px; }

    /* ── Waiting state ─────────────────────────────────────────── */
    #loading { color: var(--muted); font-size: 14px; }
    /* Breathing ◆ above the "Confirming" line */
    .pc-breath {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.5rem;
      color: var(--gold);
      text-align: center;
      margin-bottom: 18px;
      animation: mc-breath 4s ease-in-out infinite;
    }
    @keyframes mc-breath {
      0%,100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    @media (prefers-reduced-motion: reduce) {
      .pc-breath { animation: none; opacity: 1; }
    }
    /* Animated dot ellipsis — targets #loading::after per existing test contract */
    #loading::after {
      content: '';
      display: inline-block;
      width: 1.2em;
      text-align: left;
      animation: dots 1.6s steps(4, end) infinite;
    }
    @keyframes dots {
      0%   { content: ''; }
      25%  { content: '.'; }
      50%  { content: '..'; }
      75%  { content: '...'; }
      100% { content: ''; }
    }
    @media (prefers-reduced-motion: reduce) {
      #loading::after { animation: none; content: '...'; }
    }

    /* ── Confirmed state ───────────────────────────────────────── */
    /* Mirror CTA as standalone primary moment */
    .pc-mirror-cta {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--panel);
      padding: 28px 24px;
      margin: 0 auto 24px;
      max-width: 480px;
      text-align: center;
    }
    .pc-mirror-cta .cta-lede {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 17px;
      color: var(--ink);
      margin-bottom: 18px;
    }
    /* .install within .pc-mirror-cta = primary solid-gold CTA (overrides global .install ghost style) */
    .pc-mirror-cta .install {
      display: inline-block;
      background: var(--gold);
      color: var(--obsidian);
      border: 1px solid var(--gold);
      font-family: 'Sora', sans-serif;
      font-size: 16px;
      font-weight: 600;
      padding: 15px 32px;
      border-radius: 9px;
      cursor: pointer;
      text-decoration: none;
      min-height: 47px;
      width: 100%;
      max-width: 320px;
    }
    @media (min-width: 600px) {
      .pc-mirror-cta .install { width: auto; }
    }

    /* Orator-only step row — kept as is but lighter weight */
    .steps { text-align: left; border: 1px solid var(--line); border-radius: 14px; background: var(--panel); padding: 8px; margin: 0 auto 20px; }
    .step { display: flex; gap: 14px; padding: 16px 18px; border-bottom: 1px solid var(--line); }
    .step:last-child { border-bottom: none; }
    .step .n { color: var(--gold); font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 22px; min-width: 24px; }
    .step .t { font-size: 13px; color: #c2bfb6; }

    /* Dividers */
    .pc-divider { border: none; border-top: 1px solid var(--line); margin: 20px auto; max-width: 480px; }

    /* Receipt — single collapsed line */
    .pc-receipt-line {
      color: var(--muted);
      font-size: 0.82rem;
      text-align: center;
      letter-spacing: 0.04em;
      margin: 0 auto 16px;
    }

    /* Install link — text link with 44px tap target */
    .pc-install {
      display: inline-block;
      color: var(--gold);
      text-decoration: underline;
      font-size: 0.78rem;
      padding: 12px 16px;
      min-height: 44px;
      line-height: 1.8;
      cursor: pointer;
      background: none;
      border: none;
      font-family: 'Sora', sans-serif;
    }

    .footer { color: #5f5d58; font-size: 12px; margin-top: 28px; }

    /* Error state */
    .error { display: none; border: 1px solid var(--line); background: var(--panel); border-radius: 12px; padding: 20px; color: #cfccc4; font-size: 14px; }
    a.link { color: var(--gold); text-decoration: none; padding: 12px 16px; display: inline-block; min-height: 44px; }
  </style>
  <script src="/track.js" defer></script>
</head>
<body>
  <div class="card">
    <div class="eyebrow">◆ MainCharacter</div>

    <!-- ── Waiting state (polling) ─────────────────────────────── -->
    <!-- #loading::after appends the animated dot ellipsis; text is node content -->
    <div id="loading" aria-live="polite" role="status">
      <!-- ◆ breath animation above the confirming line -->
      <div class="pc-breath" aria-hidden="true">◆</div>
      Confirming with the bank
    </div>

    <!-- ── Confirmed state ──────────────────────────────────────── -->
    <div id="confirmed" style="display:none;" aria-live="polite">
      <h1 id="headline">The Chamber is open. ◆</h1>
      <p class="lede" id="lede">Your place is held. Here is what happens next.</p>

      <!-- Mirror CTA block — rendered here if lookmaxxingActive -->
      <div id="pcMirrorBlock"></div>

      <!-- Orator step row (if applicable) -->
      <div class="steps" id="steps" style="display:none;"></div>

      <hr class="pc-divider" />

      <!-- Collapsed receipt line (single line per design spec §2.3) -->
      <div class="pc-receipt-line" id="pcReceiptLine">—</div>
      <!-- Hidden compatibility elements — retain ids so existing tests and server
           integrations that reference rPlan/rAmount/rNext continue to pass.
           Populated by renderConfirmed() alongside the visible receipt line. -->
      <span id="rPlan" style="display:none" aria-hidden="true"></span>
      <span id="rAmount" style="display:none" aria-hidden="true"></span>
      <span id="rNext" style="display:none" aria-hidden="true"></span>

      <hr class="pc-divider" />

      <!-- PWA install — text link, not a pill -->
      <div id="pcInstallBlock" style="display:none;">
        <button class="pc-install" id="installBtn" type="button" data-event="pwa_install_prompted">Install the app</button>
      </div>

      <div class="footer">◆ MainCharacter</div>
    </div>

    <!-- ── Error / timeout state (unchanged) ────────────────────── -->
    <div id="error" class="error" aria-live="polite">
      Your payment is being verified. Please refresh in a moment, or contact
      <a class="link" href="mailto:support@maincharacter.digitglobalservices.com">support@maincharacter.digitglobalservices.com</a>.
      <br /><br />
      <a class="link" href="/lookmax/login" id="emailLinkFallback"
         aria-label="Send me an entry link instead"
         data-event="first_login_fallback_clicked">
        Send me an entry link instead
      </a>
    </div>
  </div>

<script>
  // ── Poll config (overridable for tests) ──
  var POLL_INTERVAL = window.__PC_POLL_INTERVAL_MS || 3000;
  var POLL_TIMEOUT  = window.__PC_POLL_TIMEOUT_MS  || 30000;

  // ── KPI: page load ────────────────────────────────────────────────────────────
  (function () {
    var q2 = new URLSearchParams(location.search);
    var sid = q2.get('razorpay_subscription_id') || q2.get('subscriptionId') || '';
    if (window.mc) window.mc.track('payment_confirmed_loaded', { subscriptionId: sid });
  })();

  var q = new URLSearchParams(location.search);
  var subscriptionId = q.get('razorpay_subscription_id') || q.get('subscriptionId') || '';
  var paymentId  = q.get('razorpay_payment_id') || '';
  var signature  = q.get('razorpay_signature') || '';

  // One-line localStorage helper (app.js NOT loaded on this page by design)
  function setLMToken(jwt) {
    try { localStorage.setItem('lookmax.token', jwt); } catch (_e) { /* storage blocked */ }
  }

  function fmtINR(paise) {
    if (paise == null) return '—';
    return '₹' + Math.round(paise / 100).toLocaleString('en-IN');
  }
  function fmtDate(iso) {
    try { return new Date(iso).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }); }
    catch (_e) { return '—'; }
  }

  function showError() {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
    if (window.mc) window.mc.track('payment_confirm_timeout');
  }

  // Exchange the firstLoginToken for a 24h JWT and store it silently.
  async function exchangeFirstLogin(firstLoginToken) {
    try {
      var res = await fetch('/api/lookmax/auth/exchange-first-login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ firstLoginToken: firstLoginToken }),
      });
      if (!res.ok) return null;
      var data = await res.json().catch(function() { return null; });
      if (data && data.token) {
        setLMToken(data.token);
        return data.token;
      }
    } catch (_e) { /* silent — fail gracefully */ }
    return null;
  }

  function renderSteps(d) {
    // ── Mirror CTA block (Lookmaxxing) ────────────────────────────────────────
    if (d.lookmaxxingActive) {
      // FOUNDER COPY: button label + supporting line for confirmed.mirrorCta
      var mirrorBlock = document.getElementById('pcMirrorBlock');
      mirrorBlock.innerHTML =
        '<div class="pc-mirror-cta">' +
          '<p class="cta-lede">The mirror is ready when you are.</p>' +
          '<button class="install" type="button" id="enterMirror" ' +
            'aria-label="Open the mirror" data-event="first_mirror_click">' +
            'Open the mirror' +
          '</button>' +
        '</div>';
    }

    // ── Orator step row (if Orator-only or hybrid) ────────────────────────────
    if (d.oratorActive) {
      var stepsEl = document.getElementById('steps');
      stepsEl.style.display = '';
      stepsEl.innerHTML =
        '<div class="step">' +
          '<div class="n">◆</div>' +
          '<div class="t">Your first message arrives tomorrow morning at your preferred time.</div>' +
        '</div>';

      // COPY APPROVED 2026-05-28 (#30): Orator-only disabled-button + caption — see product/copy-pending-approval-2026-05-28.md
      // Only show the disabled CTA block when the user bought Orator without Lookmaxxing
      if (!d.lookmaxxingActive) {
        var oratorCtaBlock = document.getElementById('pcMirrorBlock');
        if (oratorCtaBlock) {
          oratorCtaBlock.innerHTML =
            '<div class="pc-mirror-cta">' +
              '<button class="install" type="button" disabled ' +
                'aria-label="Day 1 arrives tomorrow" ' +
                'style="opacity:0.55;cursor:default;">' +
                'Day 1 arrives tomorrow' +
              '</button>' +
              '<p style="margin-top:12px;font-size:13px;color:var(--muted);font-family:\'Sora\',sans-serif;">' +
                'Your first message lands at the time you chose. Nothing to do tonight.' +
              '</p>' +
            '</div>';
        }
      }
    }

    // ── Fallback if neither ────────────────────────────────────────────────────
    if (!d.lookmaxxingActive && !d.oratorActive) {
      var stepsEl2 = document.getElementById('steps');
      stepsEl2.style.display = '';
      stepsEl2.innerHTML =
        '<div class="step">' +
          '<div class="n">◆</div>' +
          '<div class="t">Your protocol is being prepared. Watch your WhatsApp.</div>' +
        '</div>';
    }

    // ── PWA install link ───────────────────────────────────────────────────────
    if (d.lookmaxxingActive) {
      document.getElementById('pcInstallBlock').style.display = '';
    }
  }

  // Render the confirmed view from the status response.
  async function renderConfirmed(d) {
    document.getElementById('loading').style.display = 'none';

    // Opacity fade-in on #confirmed (spec §5)
    var confirmedEl = document.getElementById('confirmed');
    confirmedEl.style.opacity = '0';
    confirmedEl.style.display = 'block';
    var reducedMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (reducedMotion) {
      confirmedEl.style.opacity = '1';
    } else {
      requestAnimationFrame(function() {
        requestAnimationFrame(function() {
          confirmedEl.style.transition = 'opacity 0.4s ease';
          confirmedEl.style.opacity = '1';
        });
      });
    }

    document.getElementById('headline').textContent = 'The Chamber is open, ' + (d.name || 'Seeker') + '. ◆';
    renderSteps(d);

    // Collapsed receipt line (single line per design spec §2.3)
    var planLabel = d.planLabel || '—';
    var amount = d.amount != null ? fmtINR(d.amount) + '/mo' : '—';
    var nextDate = fmtDate(d.nextBillingDate);
    document.getElementById('pcReceiptLine').textContent =
      planLabel + ' · ' + amount + ' · next billing ' + nextDate;
    // Also populate hidden compat elements (preserves existing test/server contracts)
    document.getElementById('rPlan').textContent = d.planLabel || '—';
    document.getElementById('rAmount').textContent = d.amount != null ? fmtINR(d.amount) + ' / month' : '—';
    document.getElementById('rNext').textContent = nextDate;

    // Wire mirror button
    document.addEventListener('click', function(e) {
      if (e.target && e.target.id === 'enterMirror') {
        if (window.mc) window.mc.track('first_mirror_click');
        location.href = '/lookmax/';
      }
    });

    // PWA install prompt wiring
    var deferredPrompt = null;
    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      deferredPrompt = e;
    });
    window.addEventListener('appinstalled', function() {
      if (window.mc) window.mc.track('pwa_installed');
    });
    document.addEventListener('click', function(e) {
      if (e.target && e.target.id === 'installBtn' && deferredPrompt) {
        deferredPrompt.prompt();
      }
    });

    // KPI: payment confirmed
    if (window.mc) window.mc.track('payment_confirmed', {
      plan: d.planLabel,
      source: 'webhook',
    });

    // Exchange firstLoginToken silently
    if (d.firstLoginToken) {
      await exchangeFirstLogin(d.firstLoginToken);
    }
  }

  // Auto-poll loop — 3s intervals, up to POLL_TIMEOUT ms total.
  async function load() {
    if (!subscriptionId) { showError(); return; }

    var started = Date.now();

    async function attempt() {
      try {
        var params = new URLSearchParams({ subscriptionId: subscriptionId });
        if (paymentId) params.set('paymentId', paymentId);
        if (signature)  params.set('signature', signature);
        var res = await fetch('/api/payment/status?' + params.toString());
        var d = await res.json();
        if (res.ok && d.found) {
          await renderConfirmed(d);
          return; // done
        }
      } catch (_e) { /* network error — keep polling */ }

      // Not found yet — check timeout.
      if (Date.now() - started >= POLL_TIMEOUT) {
        showError();
        return;
      }

      // Schedule next attempt.
      setTimeout(attempt, POLL_INTERVAL);
    }

    attempt();
  }

  load();
</script>
</body>
</html>
