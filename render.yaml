# render.yaml — Blueprint for Render.com deployment
# Use this for auto-deploy OR configure manually in the Render dashboard

services:
  - type: web
    name: maincharacter
    runtime: node
    plan: free
    # ffmpeg required for Weekly Reveal MP4 composer (services/video.js, B4).
    # Render's free Node image does not ship with it; apt-install at build time.
    buildCommand: apt-get update && apt-get install -y --no-install-recommends ffmpeg && npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: GEMINI_API_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      # ─── WhatsApp Cloud API (Meta) — dormant until set (DRY-RUN) ───
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_BUSINESS_ACCOUNT_ID
        sync: false
      - key: WHATSAPP_APP_SECRET
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      # ─── MSG91 (SMS/OTP) ───
      - key: MSG91_AUTH_KEY
        sync: false
      - key: MSG91_TEMPLATE_ID_OTP
        sync: false
      - key: MSG91_SENDER_ID
        sync: false
      # ─── Resend (email) ───
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      # ─── Admin ───
      - key: ADMIN_PHONE
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: UPGRADE_BASE_URL
        value: https://maincharacter.digitglobalservices.com
      # ─── Slack alerting — DRY-RUN (logged no-op) until set ───
      # Paste a Slack incoming webhook URL (Settings > Incoming Webhooks in your Slack app).
      # When unset: alerts log at warn/info level and never POST to Slack.
      - key: SLACK_WEBHOOK_URL
        sync: false
      # ─── Gemini resilience ───
      # Override the 10-RPM in-process rate limiter. Raise if you upgrade your Gemini quota.
      # Default: 10. Set to 0 to force all Gemini calls to use the fallback scorer.
      - key: GEMINI_RPM_LIMIT
        sync: false
